<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPX Signal Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --surface2: #1a1a26;
  --border: #2a2a3a;
  --text: #e4e4ef;
  --text-dim: #7a7a8e;
  --text-muted: #4a4a5e;
  --green: #00e676;
  --green-dim: #00e67622;
  --red: #ff5252;
  --red-dim: #ff525222;
  --blue: #448aff;
  --blue-dim: #448aff22;
  --amber: #ffd740;
  --amber-dim: #ffd74022;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

.grain {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
}

.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 40px 20px 80px;
}

.header {
  margin-bottom: 48px;
}

.header h1 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 8px;
}

.header .date {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: var(--text-muted);
}

/* Loading state */
.loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 400px;
  gap: 24px;
}

.loading .spinner {
  width: 40px;
  height: 40px;
  border: 2px solid var(--border);
  border-top-color: var(--blue);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.loading p {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: var(--text-dim);
}

/* Error state */
.error-box {
  background: var(--red-dim);
  border: 1px solid #ff525244;
  border-radius: 8px;
  padding: 24px;
  margin: 40px 0;
}

.error-box h3 {
  color: var(--red);
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  margin-bottom: 8px;
}

.error-box p {
  color: var(--text-dim);
  font-size: 14px;
  line-height: 1.6;
}

/* Score hero */
.score-hero {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px;
  margin-bottom: 24px;
  position: relative;
  overflow: hidden;
}

.score-hero::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--score-color, var(--blue)), transparent);
}

.score-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 32px;
}

.price-block .price {
  font-family: 'JetBrains Mono', monospace;
  font-size: 32px;
  font-weight: 700;
  letter-spacing: -1px;
}

.price-block .change {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  margin-top: 4px;
}

.vix-block {
  text-align: right;
}

.vix-block .label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 4px;
}

.vix-block .value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 24px;
  font-weight: 600;
  color: var(--amber);
}

.score-main {
  display: flex;
  align-items: center;
  gap: 24px;
}

.score-number {
  font-family: 'JetBrains Mono', monospace;
  font-size: 64px;
  font-weight: 700;
  line-height: 1;
  letter-spacing: -3px;
}

.score-meta .score-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 4px;
}

.score-meta .score-prev {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--text-muted);
}

/* Score bar */
.score-bar-container {
  margin-top: 32px;
  padding-top: 24px;
  border-top: 1px solid var(--border);
}

.score-bar-labels {
  display: flex;
  justify-content: space-between;
  margin-bottom: 8px;
}

.score-bar-labels span {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-muted);
}

.score-bar {
  height: 6px;
  background: linear-gradient(90deg, var(--red), var(--red-dim) 30%, var(--border) 45%, var(--border) 55%, var(--green-dim) 70%, var(--green));
  border-radius: 3px;
  position: relative;
}

.score-bar .marker {
  position: absolute;
  top: -5px;
  width: 16px;
  height: 16px;
  background: var(--text);
  border-radius: 50%;
  transform: translateX(-50%);
  box-shadow: 0 0 12px rgba(255,255,255,0.3);
  transition: left 0.6s ease;
}

/* Cards grid */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 24px;
}

@media (max-width: 640px) {
  .grid { grid-template-columns: 1fr; }
  .score-number { font-size: 48px; }
  .price-block .price { font-size: 24px; }
  .container { padding: 24px 16px 60px; }
  .score-hero { padding: 24px; }
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
}

.card.full { grid-column: 1 / -1; }

.card h2 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 20px;
}

/* Signal breakdown */
.signal-row {
  display: flex;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  gap: 12px;
}

.signal-row:last-child { border-bottom: none; }

.signal-name {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 500;
  width: 100px;
  flex-shrink: 0;
}

.signal-bar-track {
  flex: 1;
  height: 4px;
  background: var(--surface2);
  border-radius: 2px;
  position: relative;
  overflow: visible;
}

.signal-bar-fill {
  position: absolute;
  top: 0;
  height: 100%;
  border-radius: 2px;
  transition: width 0.6s ease;
  min-width: 2px;
}

.signal-bar-fill.positive {
  left: 50%;
  background: var(--green);
}

.signal-bar-fill.negative {
  right: 50%;
  background: var(--red);
}

.signal-bar-center {
  position: absolute;
  left: 50%;
  top: -3px;
  width: 1px;
  height: 10px;
  background: var(--text-muted);
}

.signal-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 600;
  width: 60px;
  text-align: right;
  flex-shrink: 0;
}

/* MA levels */
.ma-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}

.ma-row:last-child { border-bottom: none; }

.ma-name {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: var(--text-dim);
  width: 60px;
}

.ma-price {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  font-weight: 500;
}

.ma-dist {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 500;
  width: 80px;
  text-align: right;
}

/* Historical context */
.context-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 16px;
}

@media (max-width: 640px) {
  .context-grid { grid-template-columns: 1fr 1fr; }
}

.context-stat .stat-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 2px;
}

.context-stat .stat-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 1px;
  text-transform: uppercase;
}

/* Footer */
.footer {
  margin-top: 48px;
  padding-top: 24px;
  border-top: 1px solid var(--border);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-muted);
  line-height: 1.8;
  text-align: center;
}

/* Fade in animation */
.fade-in {
  animation: fadeIn 0.5s ease both;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.fade-in:nth-child(1) { animation-delay: 0.05s; }
.fade-in:nth-child(2) { animation-delay: 0.1s; }
.fade-in:nth-child(3) { animation-delay: 0.15s; }
.fade-in:nth-child(4) { animation-delay: 0.2s; }
.fade-in:nth-child(5) { animation-delay: 0.25s; }
.fade-in:nth-child(6) { animation-delay: 0.3s; }
</style>
</head>
<body>
<div class="grain"></div>
<div class="container" id="app">
  <div class="header">
    <h1>SPX Signal Dashboard</h1>
    <div class="date" id="dateDisplay">Loading...</div>
  </div>
  <div class="loading" id="loadingState">
    <div class="spinner"></div>
    <p>Fetching SPX & VIX data...</p>
  </div>
  <div id="dashboard" style="display:none;"></div>
  <div id="errorState" style="display:none;"></div>
</div>

<script>
// ============================================================
// SPX Signal Dashboard — Client-side computation
// Mirrors the Python scoring engine
// ============================================================

// --- Data fetching with multiple fallbacks ---
const PROXIES = [
  (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  (url) => `https://corsproxy.io/?url=${encodeURIComponent(url)}`,
  (url) => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
];

async function fetchWithFallback(url) {
  let lastError;
  for (const makeProxy of PROXIES) {
    try {
      const proxyUrl = makeProxy(url);
      const resp = await fetch(proxyUrl);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      return await resp.json();
    } catch (e) {
      lastError = e;
      continue;
    }
  }
  // Final fallback: try Yahoo's v8 endpoint directly (works in some browsers)
  try {
    const resp = await fetch(url);
    if (resp.ok) return await resp.json();
  } catch(e) { /* ignore */ }
  throw lastError;
}

async function fetchYahooData(symbol, range = "2y", interval = "1d") {
  const yahooUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?range=${range}&interval=${interval}`;
  const json = await fetchWithFallback(yahooUrl);

  const result = json.chart.result[0];
  const timestamps = result.timestamp;
  const quotes = result.indicators.quote[0];
  const adjClose = result.indicators.adjclose?.[0]?.adjclose || quotes.close;

  const data = [];
  for (let i = 0; i < timestamps.length; i++) {
    if (quotes.close[i] == null) continue;
    data.push({
      date: new Date(timestamps[i] * 1000),
      open: quotes.open[i],
      high: quotes.high[i],
      low: quotes.low[i],
      close: adjClose[i] || quotes.close[i],
      volume: quotes.volume[i],
    });
  }
  return data;
}

// --- Technical indicators ---
function computeEMA(values, period) {
  const k = 2 / (period + 1);
  const ema = [values[0]];
  for (let i = 1; i < values.length; i++) {
    ema.push(values[i] * k + ema[i - 1] * (1 - k));
  }
  return ema;
}

function computeRSI(closes, period) {
  const rsi = new Array(closes.length).fill(null);
  if (closes.length < period + 1) return rsi;

  let avgGain = 0, avgLoss = 0;
  for (let i = 1; i <= period; i++) {
    const delta = closes[i] - closes[i - 1];
    if (delta > 0) avgGain += delta;
    else avgLoss -= delta;
  }
  avgGain /= period;
  avgLoss /= period;

  rsi[period] = avgLoss === 0 ? 100 : 100 - 100 / (1 + avgGain / avgLoss);

  for (let i = period + 1; i < closes.length; i++) {
    const delta = closes[i] - closes[i - 1];
    const gain = delta > 0 ? delta : 0;
    const loss = delta < 0 ? -delta : 0;
    avgGain = (avgGain * (period - 1) + gain) / period;
    avgLoss = (avgLoss * (period - 1) + loss) / period;
    rsi[i] = avgLoss === 0 ? 100 : 100 - 100 / (1 + avgGain / avgLoss);
  }
  return rsi;
}

function computeSMA(values, period) {
  const sma = new Array(values.length).fill(null);
  for (let i = period - 1; i < values.length; i++) {
    let sum = 0;
    for (let j = i - period + 1; j <= i; j++) sum += values[j];
    sma[i] = sum / period;
  }
  return sma;
}

function computeMACD(closes) {
  const ema12 = computeEMA(closes, 12);
  const ema26 = computeEMA(closes, 26);
  const macdLine = ema12.map((v, i) => v - ema26[i]);
  const signalLine = computeEMA(macdLine, 9);
  const histogram = macdLine.map((v, i) => v - signalLine[i]);
  return { macdLine, signalLine, histogram };
}

function computeBollinger(closes, period = 20, numStd = 2) {
  const sma = computeSMA(closes, period);
  const pctB = new Array(closes.length).fill(null);

  for (let i = period - 1; i < closes.length; i++) {
    let sumSq = 0;
    for (let j = i - period + 1; j <= i; j++) {
      sumSq += (closes[j] - sma[i]) ** 2;
    }
    const std = Math.sqrt(sumSq / period);
    const upper = sma[i] + numStd * std;
    const lower = sma[i] - numStd * std;
    pctB[i] = (upper - lower) === 0 ? 0.5 : (closes[i] - lower) / (upper - lower);
  }
  return pctB;
}

function computeATR(data, period = 14) {
  const tr = data.map((d, i) => {
    if (i === 0) return d.high - d.low;
    const prev = data[i - 1].close;
    return Math.max(d.high - d.low, Math.abs(d.high - prev), Math.abs(d.low - prev));
  });
  return computeSMA(tr, period);
}

// --- Signal scorers (match Python logic) ---
function scoreRSI14(rsi) {
  if (rsi == null) return 0;
  if (rsi < 30) return 1;
  if (rsi > 70) return -1;
  return -(rsi - 50) / 20;
}

function scoreRSI5(rsi) {
  if (rsi == null) return 0;
  return Math.max(-1, Math.min(1, -(rsi - 50) / 30));
}

function scoreMACD(hist, histArray, idx) {
  if (hist == null) return 0;
  const lookback = 60;
  const start = Math.max(0, idx - lookback);
  const slice = histArray.slice(start, idx + 1).filter(v => v != null);
  if (slice.length < 5) return 0;
  const range = Math.max(...slice) - Math.min(...slice);
  if (range === 0) return 0;
  return Math.max(-1, Math.min(1, hist / (range / 2)));
}

function scoreMACross(shortMA, longMA) {
  if (shortMA == null || longMA == null) return 0;
  return shortMA > longMA ? 1 : -1;
}

function scoreBollinger(pctB) {
  if (pctB == null) return 0;
  return Math.max(-1, Math.min(1, -(pctB - 0.5) * 2));
}

function scoreVIX(vixClose, vixMA20) {
  if (vixClose == null || vixMA20 == null || vixMA20 === 0) return 0;
  const dev = (vixClose - vixMA20) / vixMA20;
  return Math.max(-1, Math.min(1, dev * 3));
}

function scoreVolume(volRatio, dailyReturn) {
  if (volRatio == null) return 0;
  const direction = dailyReturn > 0 ? 1 : dailyReturn < 0 ? -1 : 0;
  const excess = Math.max(-1, Math.min(1, volRatio - 1));
  return Math.max(-1, Math.min(1, direction * excess * 0.5));
}

function scoreROC(roc) {
  if (roc == null) return 0;
  if (Math.abs(roc) > 15) return -Math.sign(roc) * 0.5;
  return Math.max(-1, Math.min(1, roc / 10));
}

// --- Signal weights ---
const SIGNAL_CONFIG = {
  RSI_14:   { weight: 0.6 },
  RSI_5:    { weight: 0.7 },
  MACD:     { weight: 0.6 },
  MA_20_50: { weight: 0.5 },
  MA_50_200:{ weight: 0.4 },
  Bollinger:{ weight: 0.6 },
  VIX:      { weight: 0.8 },
  Volume:   { weight: 0.3 },
  ROC_20:   { weight: 0.5 },
};

// --- Main computation ---
async function computeSignals() {
  const [spxData, vixData] = await Promise.all([
    fetchYahooData("^GSPC", "2y"),
    fetchYahooData("^VIX", "2y"),
  ]);

  // Merge VIX into SPX by date
  const vixMap = new Map();
  vixData.forEach(d => {
    const key = d.date.toISOString().slice(0, 10);
    vixMap.set(key, d.close);
  });

  const data = spxData.map(d => ({
    ...d,
    dateStr: d.date.toISOString().slice(0, 10),
    vixClose: vixMap.get(d.date.toISOString().slice(0, 10)) || null,
  }));

  // Forward-fill VIX
  for (let i = 1; i < data.length; i++) {
    if (data[i].vixClose == null) data[i].vixClose = data[i - 1].vixClose;
  }

  const closes = data.map(d => d.close);
  const volumes = data.map(d => d.volume);
  const vixCloses = data.map(d => d.vixClose);

  // Compute indicators
  const rsi14 = computeRSI(closes, 14);
  const rsi5 = computeRSI(closes, 5);
  const macd = computeMACD(closes);
  const ma10 = computeSMA(closes, 10);
  const ma20 = computeSMA(closes, 20);
  const ma50 = computeSMA(closes, 50);
  const ma200 = computeSMA(closes, 200);
  const pctB = computeBollinger(closes);
  const volMA20 = computeSMA(volumes, 20);
  const vixMA20 = computeSMA(vixCloses, 20);
  const atr = computeATR(data);

  const i = data.length - 1;
  const iPrev = data.length - 2;

  // Score each signal
  const signals = {
    RSI_14:    scoreRSI14(rsi14[i]),
    RSI_5:     scoreRSI5(rsi5[i]),
    MACD:      scoreMACD(macd.histogram[i], macd.histogram, i),
    MA_20_50:  scoreMACross(ma20[i], ma50[i]),
    MA_50_200: scoreMACross(ma50[i], ma200[i]),
    Bollinger: scoreBollinger(pctB[i]),
    VIX:       scoreVIX(vixCloses[i], vixMA20[i]),
    Volume:    scoreVolume(volMA20[i] ? volumes[i] / volMA20[i] : null, (closes[i] - closes[i - 1]) / closes[i - 1]),
    ROC_20:    scoreROC(i >= 20 ? (closes[i] / closes[i - 20] - 1) * 100 : null),
  };

  // Previous day scores
  const prevSignals = {
    RSI_14:    scoreRSI14(rsi14[iPrev]),
    RSI_5:     scoreRSI5(rsi5[iPrev]),
    MACD:      scoreMACD(macd.histogram[iPrev], macd.histogram, iPrev),
    MA_20_50:  scoreMACross(ma20[iPrev], ma50[iPrev]),
    MA_50_200: scoreMACross(ma50[iPrev], ma200[iPrev]),
    Bollinger: scoreBollinger(pctB[iPrev]),
    VIX:       scoreVIX(vixCloses[iPrev], vixMA20[iPrev]),
    Volume:    scoreVolume(volMA20[iPrev] ? volumes[iPrev] / volMA20[iPrev] : null, (closes[iPrev] - closes[iPrev - 1]) / closes[iPrev - 1]),
    ROC_20:    scoreROC(iPrev >= 20 ? (closes[iPrev] / closes[iPrev - 20] - 1) * 100 : null),
  };

  // Composite score
  let composite = 0;
  let prevComposite = 0;
  for (const [name, cfg] of Object.entries(SIGNAL_CONFIG)) {
    composite += (signals[name] || 0) * cfg.weight;
    prevComposite += (prevSignals[name] || 0) * cfg.weight;
  }

  // Historical context: look at all scores in data
  const allScores = [];
  for (let j = 200; j < data.length - 5; j++) {
    const s = {
      RSI_14:    scoreRSI14(rsi14[j]),
      RSI_5:     scoreRSI5(rsi5[j]),
      MACD:      scoreMACD(macd.histogram[j], macd.histogram, j),
      MA_20_50:  scoreMACross(ma20[j], ma50[j]),
      MA_50_200: scoreMACross(ma50[j], ma200[j]),
      Bollinger: scoreBollinger(pctB[j]),
      VIX:       scoreVIX(vixCloses[j], vixMA20[j]),
      Volume:    scoreVolume(volMA20[j] ? volumes[j] / volMA20[j] : null, j > 0 ? (closes[j] - closes[j - 1]) / closes[j - 1] : 0),
      ROC_20:    scoreROC(j >= 20 ? (closes[j] / closes[j - 20] - 1) * 100 : null),
    };
    let sc = 0;
    for (const [name, cfg] of Object.entries(SIGNAL_CONFIG)) {
      sc += (s[name] || 0) * cfg.weight;
    }
    const fwdReturn = (closes[j + 5] / closes[j] - 1) * 100;
    allScores.push({ score: sc, fwdReturn });
  }

  // Find similar scores for context
  const tolerance = 0.75;
  const similar = allScores.filter(s => Math.abs(s.score - composite) <= tolerance);
  const context = similar.length >= 10 ? {
    n: similar.length,
    winRate: (similar.filter(s => s.fwdReturn > 0).length / similar.length * 100).toFixed(1),
    avgReturn: (similar.reduce((a, s) => a + s.fwdReturn, 0) / similar.length).toFixed(3),
    medianReturn: similar.map(s => s.fwdReturn).sort((a, b) => a - b)[Math.floor(similar.length / 2)].toFixed(3),
    worst: Math.min(...similar.map(s => s.fwdReturn)).toFixed(2),
    best: Math.max(...similar.map(s => s.fwdReturn)).toFixed(2),
  } : null;

  const dailyChange = ((closes[i] - closes[iPrev]) / closes[iPrev] * 100);
  const atrPct = atr[i] ? (atr[i] / closes[i] * 100) : null;

  return {
    date: data[i].dateStr,
    price: closes[i],
    dailyChange,
    vix: vixCloses[i],
    atrPct,
    composite: Math.round(composite * 100) / 100,
    prevComposite: Math.round(prevComposite * 100) / 100,
    signals,
    mas: {
      MA_10: ma10[i],
      MA_20: ma20[i],
      MA_50: ma50[i],
      MA_200: ma200[i],
    },
    context,
  };
}

// --- Rendering ---
function scoreToLabel(score) {
  if (score >= 3.5) return "STRONGLY BULLISH";
  if (score >= 2.0) return "BULLISH";
  if (score >= 0.5) return "SLIGHTLY BULLISH";
  if (score >= -0.5) return "NEUTRAL";
  if (score >= -2.0) return "SLIGHTLY BEARISH";
  if (score >= -3.5) return "BEARISH";
  return "STRONGLY BEARISH";
}

function scoreToColor(score) {
  if (score >= 2.0) return "var(--green)";
  if (score >= 0.5) return "#66bb6a";
  if (score >= -0.5) return "var(--text-dim)";
  if (score >= -2.0) return "#ef5350";
  return "var(--red)";
}

function renderDashboard(result) {
  const label = scoreToLabel(result.composite);
  const color = scoreToColor(result.composite);
  const changeColor = result.dailyChange >= 0 ? "var(--green)" : "var(--red)";
  const scoreChange = result.composite - result.prevComposite;
  const barPosition = ((result.composite + 5) / 10 * 100).toFixed(1);

  // Build signal rows sorted by absolute contribution
  const signalEntries = Object.entries(result.signals)
    .map(([name, raw]) => ({
      name,
      raw,
      weight: SIGNAL_CONFIG[name].weight,
      contrib: raw * SIGNAL_CONFIG[name].weight,
    }))
    .sort((a, b) => Math.abs(b.contrib) - Math.abs(a.contrib));

  const signalRowsHTML = signalEntries.map(s => {
    const barWidth = Math.abs(s.contrib) / 0.8 * 50;
    const isPositive = s.contrib >= 0;
    const barColor = isPositive ? "positive" : "negative";
    const valueColor = isPositive ? "var(--green)" : "var(--red)";
    return `
      <div class="signal-row">
        <span class="signal-name">${s.name}</span>
        <div class="signal-bar-track">
          <div class="signal-bar-center"></div>
          <div class="signal-bar-fill ${barColor}" style="width: ${barWidth}%"></div>
        </div>
        <span class="signal-value" style="color: ${valueColor}">${s.contrib >= 0 ? '+' : ''}${s.contrib.toFixed(3)}</span>
      </div>`;
  }).join("");

  // MA levels
  const maHTML = Object.entries(result.mas).map(([name, val]) => {
    if (val == null) return "";
    const dist = ((result.price - val) / val * 100);
    const distColor = dist >= 0 ? "var(--green)" : "var(--red)";
    const arrow = dist >= 0 ? "▲" : "▼";
    return `
      <div class="ma-row">
        <span class="ma-name">${name}</span>
        <span class="ma-price">${val.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</span>
        <span class="ma-dist" style="color: ${distColor}">${dist >= 0 ? '+' : ''}${dist.toFixed(1)}% ${arrow}</span>
      </div>`;
  }).join("");

  // Context
  const contextHTML = result.context ? `
    <div class="context-grid">
      <div class="context-stat">
        <div class="stat-value" style="color: ${parseFloat(result.context.winRate) > 55 ? 'var(--green)' : parseFloat(result.context.winRate) < 45 ? 'var(--red)' : 'var(--text)'}">${result.context.winRate}%</div>
        <div class="stat-label">Win Rate</div>
      </div>
      <div class="context-stat">
        <div class="stat-value" style="color: ${parseFloat(result.context.avgReturn) >= 0 ? 'var(--green)' : 'var(--red)'}"> ${parseFloat(result.context.avgReturn) >= 0 ? '+' : ''}${result.context.avgReturn}%</div>
        <div class="stat-label">Avg Return</div>
      </div>
      <div class="context-stat">
        <div class="stat-value">${result.context.n}</div>
        <div class="stat-label">Occurrences</div>
      </div>
      <div class="context-stat">
        <div class="stat-value" style="color: var(--green)">${result.context.best}%</div>
        <div class="stat-label">Best</div>
      </div>
      <div class="context-stat">
        <div class="stat-value" style="color: var(--red)">${result.context.worst}%</div>
        <div class="stat-label">Worst</div>
      </div>
      <div class="context-stat">
        <div class="stat-value">${result.context.medianReturn}%</div>
        <div class="stat-label">Median</div>
      </div>
    </div>
  ` : `<p style="color: var(--text-muted); font-size: 13px;">Not enough historical data for this score level.</p>`;

  document.getElementById("dashboard").innerHTML = `
    <div class="score-hero fade-in" style="--score-color: ${color}">
      <div class="score-top">
        <div class="price-block">
          <div class="price">${result.price.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
          <div class="change" style="color: ${changeColor}">${result.dailyChange >= 0 ? '+' : ''}${result.dailyChange.toFixed(2)}%</div>
        </div>
        <div class="vix-block">
          <div class="label">VIX</div>
          <div class="value">${result.vix ? result.vix.toFixed(2) : '—'}</div>
        </div>
      </div>
      <div class="score-main">
        <div class="score-number" style="color: ${color}">${result.composite >= 0 ? '+' : ''}${result.composite.toFixed(2)}</div>
        <div class="score-meta">
          <div class="score-label" style="color: ${color}">${label}</div>
          <div class="score-prev">prev ${result.prevComposite >= 0 ? '+' : ''}${result.prevComposite.toFixed(2)} · chg ${scoreChange >= 0 ? '+' : ''}${scoreChange.toFixed(2)}</div>
        </div>
      </div>
      <div class="score-bar-container">
        <div class="score-bar-labels">
          <span>-5 Bearish</span>
          <span>Neutral</span>
          <span>Bullish +5</span>
        </div>
        <div class="score-bar">
          <div class="marker" style="left: ${barPosition}%"></div>
        </div>
      </div>
    </div>

    <div class="grid">
      <div class="card full fade-in">
        <h2>Signal Breakdown</h2>
        ${signalRowsHTML}
      </div>
      <div class="card fade-in">
        <h2>Key Levels</h2>
        ${maHTML}
      </div>
      <div class="card fade-in">
        <h2>ATR (14d)</h2>
        <div class="context-stat">
          <div class="stat-value">${result.atrPct ? result.atrPct.toFixed(2) + '%' : '—'}</div>
          <div class="stat-label">Daily Range</div>
        </div>
      </div>
      <div class="card full fade-in">
        <h2>Historical Context — 10 Day Hold</h2>
        ${contextHTML}
      </div>
    </div>

    <div class="footer fade-in">
      Research tool only — not financial advice.<br>
      Always use proper risk management.
    </div>
  `;

  document.getElementById("dashboard").style.display = "block";
}

// --- Init ---
async function init() {
  document.getElementById("dateDisplay").textContent = new Date().toLocaleDateString("en-US", {
    weekday: "long", year: "numeric", month: "long", day: "numeric"
  });

  try {
    const result = await computeSignals();
    document.getElementById("loadingState").style.display = "none";
    renderDashboard(result);
  } catch (err) {
    console.error(err);
    document.getElementById("loadingState").style.display = "none";
    document.getElementById("errorState").innerHTML = `
      <div class="error-box">
        <h3>Failed to load data</h3>
        <p>${err.message}<br><br>All CORS proxies failed to reach Yahoo Finance. Try refreshing, or if this persists, try opening in a different browser or disabling ad blockers.</p>
      </div>
    `;
    document.getElementById("errorState").style.display = "block";
  }
}

init();
</script>
</body>
</html>

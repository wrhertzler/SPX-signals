<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPX Signal Dashboard V5</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a26;--border:#2a2a3a;--text:#e4e4ef;--text-dim:#7a7a8e;--text-muted:#4a4a5e;--green:#00e676;--green-dim:#00e67622;--red:#ff5252;--red-dim:#ff525222;--blue:#448aff;--blue-dim:#448aff22;--amber:#ffd740;--amber-dim:#ffd74022;--purple:#ab47bc}
*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
.grain{position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:9999}
.container{max-width:900px;margin:0 auto;padding:40px 20px 80px}.header{margin-bottom:48px}.header h1{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:var(--text-dim);margin-bottom:8px}.header .date{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text-muted)}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;gap:24px}.spinner{width:40px;height:40px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 1s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.loading p{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text-dim)}
.error-box{background:var(--red-dim);border:1px solid #ff525244;border-radius:8px;padding:24px;margin:40px 0}.error-box h3{color:var(--red);font-family:'JetBrains Mono',monospace;font-size:14px;margin-bottom:8px}.error-box p{color:var(--text-dim);font-size:14px;line-height:1.6}
.score-hero{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px;margin-bottom:16px;position:relative;overflow:hidden}.score-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--score-color,var(--blue)),transparent)}
.score-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px}.price-block .price{font-family:'JetBrains Mono',monospace;font-size:32px;font-weight:700;letter-spacing:-1px}.price-block .change{font-family:'JetBrains Mono',monospace;font-size:14px;margin-top:4px}
.vix-atr{text-align:right}.vix-atr .label{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);margin-bottom:2px}.vix-atr .value{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:600}
.score-main{display:flex;align-items:center;gap:24px;margin-bottom:16px}.score-number{font-family:'JetBrains Mono',monospace;font-size:64px;font-weight:700;line-height:1;letter-spacing:-3px}.score-meta .score-label{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:600;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}.score-meta .score-prev{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-muted)}
.regime-badge{display:inline-flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;padding:6px 14px;border-radius:6px;letter-spacing:1px;margin-bottom:20px}
.regime-BULL_TREND{background:var(--green-dim);color:var(--green);border:1px solid rgba(0,230,118,0.2)}.regime-BEAR_TREND{background:var(--red-dim);color:var(--red);border:1px solid rgba(255,82,82,0.2)}.regime-HIGH_VOL{background:var(--amber-dim);color:var(--amber);border:1px solid rgba(255,215,64,0.2)}.regime-CHOPPY{background:var(--surface2);color:var(--text-dim);border:1px solid var(--border)}
.score-bar-container{padding-top:20px;border-top:1px solid var(--border)}.score-bar-labels{display:flex;justify-content:space-between;margin-bottom:4px}.score-bar-labels span{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-muted)}
.score-bar-zones{display:flex;margin-bottom:6px;gap:2px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.5px;text-transform:uppercase}.zone{text-align:center;padding:3px 0;border-radius:3px;color:var(--text-muted)}.zone-short{flex:2;background:rgba(255,82,82,0.15);color:var(--red)}.zone-caution-bear{flex:1.5;background:rgba(255,82,82,0.07)}.zone-neutral{flex:2;background:var(--surface2)}.zone-caution-bull{flex:1.5;background:rgba(0,230,118,0.07)}.zone-long{flex:2;background:rgba(0,230,118,0.15);color:var(--green)}
.score-bar{height:6px;background:linear-gradient(90deg,var(--red),var(--red-dim) 25%,var(--border) 40%,var(--border) 60%,var(--green-dim) 75%,var(--green));border-radius:3px;position:relative}.score-bar .marker{position:absolute;top:-5px;width:16px;height:16px;background:var(--text);border-radius:50%;transform:translateX(-50%);box-shadow:0 0 12px rgba(255,255,255,0.3);transition:left .6s ease}
.trade-setup{margin-bottom:16px;border-radius:12px;overflow:hidden}.trade-setup-header{display:flex;align-items:center;gap:10px;padding:16px 20px;font-family:'JetBrains Mono',monospace}.setup-icon{font-size:18px}.setup-direction{font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase}.setup-subtitle{font-size:11px;color:var(--text-dim);margin-left:auto}
.setup-long .trade-setup-header{background:rgba(0,230,118,0.1);border:1px solid rgba(0,230,118,0.2);border-radius:12px 12px 0 0}.setup-wait .trade-setup-header{background:var(--surface2);border:1px solid var(--border);border-radius:12px 12px 0 0}
.trade-setup-body{padding:20px;background:var(--surface);border:1px solid var(--border);border-top:none;border-radius:0 0 12px 12px}
.setup-levels{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px}.setup-level{text-align:center;padding:14px;border-radius:8px;background:var(--surface2)}.setup-level .level-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px}.setup-level .level-value{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700}.setup-level .level-detail{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim);margin-top:4px}
.setup-options-hint{padding:14px;background:var(--surface2);border-radius:8px;font-size:13px;line-height:1.6;color:var(--text-dim)}.setup-options-hint strong{color:var(--text)}.setup-wait-msg{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text-dim);line-height:1.7;padding:8px 0}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px}.card.full{grid-column:1/-1}.card h2{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);margin-bottom:20px}
.subscore-row{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);gap:12px}.subscore-row:last-child{border-bottom:none}.subscore-name{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500;width:120px;flex-shrink:0}.subscore-bar-track{flex:1;height:6px;background:var(--surface2);border-radius:3px;position:relative}.subscore-bar-fill{position:absolute;top:0;height:100%;border-radius:3px;min-width:2px}.subscore-bar-fill.positive{left:50%;background:var(--green)}.subscore-bar-fill.negative{right:50%;background:var(--red)}.subscore-bar-center{position:absolute;left:50%;top:-2px;width:1px;height:10px;background:var(--text-muted)}.subscore-value{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;width:60px;text-align:right;flex-shrink:0}
.narrative{background:var(--surface2);border-radius:10px;padding:20px;margin-bottom:20px;border-left:3px solid}.narrative p{font-size:14px;line-height:1.7;color:var(--text)}.narrative .narrative-label{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px}
.ma-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}.ma-row:last-child{border-bottom:none}.ma-name{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text-dim);width:60px}.ma-price{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:500}.ma-dist{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500;width:80px;text-align:right}
.footer{margin-top:48px;padding-top:24px;border-top:1px solid var(--border);font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-muted);line-height:1.8;text-align:center}
.fade-in{animation:fadeIn .5s ease both}@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}.fade-in:nth-child(1){animation-delay:.05s}.fade-in:nth-child(2){animation-delay:.1s}.fade-in:nth-child(3){animation-delay:.15s}.fade-in:nth-child(4){animation-delay:.2s}
@media(max-width:640px){.grid{grid-template-columns:1fr}.score-number{font-size:48px}.price-block .price{font-size:24px}.container{padding:24px 16px 60px}.score-hero{padding:24px}.setup-levels{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="grain"></div>
<div class="container">
<div class="header"><h1>SPX Signal Dashboard <span style="color:var(--blue)">V5</span></h1><div class="date" id="dateDisplay">Loading...</div></div>
<div class="loading" id="loadingState"><div class="spinner"></div><p>Fetching SPX & VIX data...</p></div>
<div id="dashboard" style="display:none"></div>
<div id="errorState" style="display:none"></div>
</div>
<script>
function delay(ms){return new Promise(r=>setTimeout(r,ms))}
async function tryFetch(url,t=8000){const c=new AbortController;const tm=setTimeout(()=>c.abort(),t);try{const r=await fetch(url,{signal:c.signal});clearTimeout(tm);if(!r.ok)throw new Error("HTTP "+r.status);const txt=await r.text();if(!txt.trim().startsWith("{")&&!txt.trim().startsWith("["))throw new Error("Not JSON");return JSON.parse(txt)}catch(e){clearTimeout(tm);throw e}}
async function fetchYahooData(sym,range,interval){range=range||"2y";interval=interval||"1d";var u1="https://query1.finance.yahoo.com/v8/finance/chart/"+sym+"?range="+range+"&interval="+interval;var u2="https://query2.finance.yahoo.com/v8/finance/chart/"+sym+"?range="+range+"&interval="+interval;var strats=[function(){return tryFetch("https://corsproxy.io/?url="+encodeURIComponent(u1))},function(){return tryFetch("https://corsproxy.io/?url="+encodeURIComponent(u2))},function(){return tryFetch("https://api.allorigins.win/raw?url="+encodeURIComponent(u1))},function(){return tryFetch("https://corsproxy.org/?url="+encodeURIComponent(u1))},function(){return tryFetch(u1)},function(){return tryFetch(u2)}];var lastErr;for(var i=0;i<strats.length;i++){try{if(i>0)await delay(300);var json=await strats[i]();if(json&&json.chart&&json.chart.result&&json.chart.result[0]){var res=json.chart.result[0],ts=res.timestamp,q=res.indicators.quote[0],ac=res.indicators.adjclose?res.indicators.adjclose[0].adjclose:q.close;var data=[];for(var j=0;j<ts.length;j++){if(q.close[j]==null)continue;data.push({date:new Date(ts[j]*1000),open:q.open[j],high:q.high[j],low:q.low[j],close:(ac?ac[j]:null)||q.close[j],volume:q.volume[j]})}if(data.length>50)return data}}catch(e){lastErr=e;continue}}throw new Error("Unable to fetch "+sym+". Try refreshing or disabling ad blockers.")}
function SMA(v,p){var r=new Array(v.length).fill(null);for(var i=p-1;i<v.length;i++){var s=0;for(var j=i-p+1;j<=i;j++)s+=v[j];r[i]=s/p}return r}
function EMA(v,p){var k=2/(p+1),r=[v[0]];for(var i=1;i<v.length;i++)r.push(v[i]*k+r[i-1]*(1-k));return r}
function RSI(c,p){var r=new Array(c.length).fill(null);if(c.length<p+1)return r;var ag=0,al=0;for(var i=1;i<=p;i++){var d=c[i]-c[i-1];if(d>0)ag+=d;else al-=d}ag/=p;al/=p;r[p]=al===0?100:100-100/(1+ag/al);for(var i=p+1;i<c.length;i++){var d=c[i]-c[i-1];ag=(ag*(p-1)+(d>0?d:0))/p;al=(al*(p-1)+(d<0?-d:0))/p;r[i]=al===0?100:100-100/(1+ag/al)}return r}
function MACD(c){var e12=EMA(c,12),e26=EMA(c,26),ml=e12.map(function(v,i){return v-e26[i]}),sl=EMA(ml,9),h=ml.map(function(v,i){return v-sl[i]});return{line:ml,signal:sl,hist:h}}
function BOLL(c,p){p=p||20;var m=SMA(c,p),pB=new Array(c.length).fill(null),up=new Array(c.length).fill(null),lo=new Array(c.length).fill(null);for(var i=p-1;i<c.length;i++){var sq=0;for(var j=i-p+1;j<=i;j++)sq+=(c[j]-m[i])*(c[j]-m[i]);var std=Math.sqrt(sq/p);up[i]=m[i]+2*std;lo[i]=m[i]-2*std;pB[i]=(up[i]-lo[i])===0?0.5:(c[i]-lo[i])/(up[i]-lo[i])}return{pctB:pB,upper:up,lower:lo}}
function WR(hi,lo,cl,p){p=p||14;var r=new Array(cl.length).fill(null);for(var i=p-1;i<cl.length;i++){var h=-Infinity,l=Infinity;for(var j=i-p+1;j<=i;j++){if(hi[j]>h)h=hi[j];if(lo[j]<l)l=lo[j]}r[i]=h===l?-50:-100*(h-cl[i])/(h-l)}return r}
function STOCH(hi,lo,cl,kp,dp){kp=kp||14;dp=dp||3;var k=new Array(cl.length).fill(null);for(var i=kp-1;i<cl.length;i++){var h=-Infinity,l=Infinity;for(var j=i-kp+1;j<=i;j++){if(hi[j]>h)h=hi[j];if(lo[j]<l)l=lo[j]}k[i]=h===l?50:100*(cl[i]-l)/(h-l)}var d=SMA(k.map(function(v){return v==null?50:v}),dp);return{k:k,d:d}}
function ADX(hi,lo,cl,p){p=p||14;var n=cl.length,tr=[hi[0]-lo[0]],pdm=[0],mdm=[0];for(var i=1;i<n;i++){tr.push(Math.max(hi[i]-lo[i],Math.abs(hi[i]-cl[i-1]),Math.abs(lo[i]-cl[i-1])));var pd=hi[i]-hi[i-1],md=lo[i-1]-lo[i];pdm.push(pd>md&&pd>0?pd:0);mdm.push(md>pd&&md>0?md:0)}var atr=EMA(tr,p),sp=EMA(pdm,p),sm=EMA(mdm,p),pdi=new Array(n).fill(null),mdi=new Array(n).fill(null),adx=new Array(n).fill(null);for(var i=p;i<n;i++){if(atr[i]===0)continue;pdi[i]=100*sp[i]/atr[i];mdi[i]=100*sm[i]/atr[i];adx[i]=pdi[i]+mdi[i]===0?0:100*Math.abs(pdi[i]-mdi[i])/(pdi[i]+mdi[i])}return{adx:EMA(adx.map(function(v){return v||0}),p),plusDI:pdi,minusDI:mdi}}
function CCI(hi,lo,cl,p){p=p||20;var r=new Array(cl.length).fill(null);for(var i=p-1;i<cl.length;i++){var tp=[];for(var j=i-p+1;j<=i;j++)tp.push((hi[j]+lo[j]+cl[j])/3);var mean=tp.reduce(function(a,b){return a+b},0)/p;var mad=tp.reduce(function(a,b){return a+Math.abs(b-mean)},0)/p;r[i]=mad===0?0:(tp[tp.length-1]-mean)/(0.015*mad)}return r}
function MFI(hi,lo,cl,vol,p){p=p||14;var r=new Array(cl.length).fill(null);var tp=cl.map(function(c,i){return(hi[i]+lo[i]+c)/3});for(var i=p;i<cl.length;i++){var pos=0,neg=0;for(var j=i-p+1;j<=i;j++){var mf=tp[j]*vol[j];if(tp[j]>tp[j-1])pos+=mf;else neg+=mf}r[i]=neg===0?100:100-100/(1+pos/neg)}return r}
function ATR(hi,lo,cl,p){p=p||14;var tr=[hi[0]-lo[0]];for(var i=1;i<cl.length;i++)tr.push(Math.max(hi[i]-lo[i],Math.abs(hi[i]-cl[i-1]),Math.abs(lo[i]-cl[i-1])));return SMA(tr,p)}
function clamp(v,lo,hi){lo=lo==null?-1:lo;hi=hi==null?1:hi;return Math.max(lo,Math.min(hi,v||0))}
function classifyRegime(ma50,ma200,adxV,pdi,mdi,vix,vixP80){if(ma50!=null&&ma200!=null&&adxV!=null&&adxV>20){if(ma50>ma200&&pdi>mdi)return"BULL_TREND";if(ma50<ma200&&mdi>pdi)return"BEAR_TREND"}if(vix!=null&&vixP80!=null&&vix>vixP80)return"HIGH_VOL";return"CHOPPY"}
function mrScore(r5,r14,wr,sk,mfi,pB,cci){var s=[],w=[];if(r5!=null){s.push(clamp(-(r5-50)/25));w.push(1)}if(wr!=null){s.push(clamp(-(wr+50)/25));w.push(.9)}if(sk!=null){s.push(clamp(-(sk-50)/25));w.push(.8)}if(mfi!=null){s.push(clamp(-(mfi-50)/25));w.push(.8)}if(pB!=null){s.push(clamp(-(pB-.5)*2));w.push(.7)}if(cci!=null){s.push(clamp(-cci/150));w.push(.6)}if(r14!=null){s.push(clamp(-(r14-50)/20));w.push(.6)}if(!s.length)return 0;var tw=w.reduce(function(a,b){return a+b},0);return s.reduce(function(a,v,i){return a+v*w[i]},0)/tw}
function momScore(mHist,mHistArr,idx,ma20,ma50,roc,sk,sd){var s=[],w=[];if(mHist!=null&&mHistArr){var st=Math.max(0,idx-60),sl=mHistArr.slice(st,idx+1).filter(function(v){return v!=null});if(sl.length>=5){var range=Math.max.apply(null,sl)-Math.min.apply(null,sl);s.push(range>0?clamp(mHist/(range/2)):0);w.push(1)}}if(ma20!=null&&ma50!=null){s.push(ma20>ma50?1:-1);w.push(.7)}if(roc!=null){s.push(clamp(roc/10));w.push(.6)}if(sk!=null&&sd!=null){s.push(sk>sd?.5:-.5);w.push(.5)}if(!s.length)return 0;var tw=w.reduce(function(a,b){return a+b},0);return s.reduce(function(a,v,i){return a+v*w[i]},0)/tw}
function volScore(vixDev,vixTerm){var s=[],w=[];if(vixDev!=null){s.push(clamp(vixDev*3));w.push(1)}if(vixTerm!=null){s.push(clamp(vixTerm*5));w.push(.6)}if(!s.length)return 0;var tw=w.reduce(function(a,b){return a+b},0);return s.reduce(function(a,v,i){return a+v*w[i]},0)/tw}
function regimeComposite(reg,mr,mom,vol,adxS){switch(reg){case"BULL_TREND":return mr*3+mom*1.5+vol*1+adxS*1.5;case"BEAR_TREND":return mr*1.5+mom*2.5+vol*1-adxS*1.5;case"HIGH_VOL":return mr*3.5+mom*.5+vol*2;case"CHOPPY":return(mr*1+mom*.5+vol*.5)*.5;default:return mr+mom+vol}}

async function computeSignals(){
  var spx=await fetchYahooData("^GSPC","2y"),vix=await fetchYahooData("^VIX","2y");
  var vm=new Map();vix.forEach(function(d){vm.set(d.date.toISOString().slice(0,10),d.close)});
  var data=spx.map(function(d){return Object.assign({},d,{dateStr:d.date.toISOString().slice(0,10),vixClose:vm.get(d.date.toISOString().slice(0,10))||null})});
  for(var i=1;i<data.length;i++)if(data[i].vixClose==null)data[i].vixClose=data[i-1].vixClose;
  var cl=data.map(function(d){return d.close}),hi=data.map(function(d){return d.high}),lo=data.map(function(d){return d.low}),vol=data.map(function(d){return d.volume}),vc=data.map(function(d){return d.vixClose});
  var r5=RSI(cl,5),r14=RSI(cl,14),mc=MACD(cl),m10=SMA(cl,10),m20=SMA(cl,20),m50=SMA(cl,50),m200=SMA(cl,200);
  var bb=BOLL(cl),wr=WR(hi,lo,cl),st=STOCH(hi,lo,cl),ax=ADX(hi,lo,cl),cc=CCI(hi,lo,cl),mf=MFI(hi,lo,cl,vol),at=ATR(hi,lo,cl);
  var vm20=SMA(vc,20),vm5=SMA(vc,5);
  var vp80=new Array(cl.length).fill(null);for(var i=251;i<cl.length;i++){var sl=vc.slice(i-251,i+1).filter(function(v){return v!=null}).sort(function(a,b){return a-b});vp80[i]=sl[Math.floor(sl.length*.8)]}
  var idx=data.length-1,ip=data.length-2;
  var regime=classifyRegime(m50[idx],m200[idx],ax.adx[idx],ax.plusDI[idx],ax.minusDI[idx],vc[idx],vp80[idx]);
  var prevRegime=classifyRegime(m50[ip],m200[ip],ax.adx[ip],ax.plusDI[ip],ax.minusDI[ip],vc[ip],vp80[ip]);
  var mr=mrScore(r5[idx],r14[idx],wr[idx],st.k[idx],mf[idx],bb.pctB[idx],cc[idx]);
  var mom=momScore(mc.hist[idx],mc.hist,idx,m20[idx],m50[idx],idx>=20?(cl[idx]/cl[idx-20]-1)*100:null,st.k[idx],st.d[idx]);
  var vd=vm20[idx]?(vc[idx]-vm20[idx])/vm20[idx]:null,vt=vm20[idx]?(vm5[idx]-vm20[idx])/vm20[idx]:null;
  var vs=volScore(vd,vt),adxS=ax.adx[idx]?clamp((ax.adx[idx]-15)/35,0,1):.5;

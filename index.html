<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPX Signal Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --surface2: #1a1a26;
  --border: #2a2a3a;
  --text: #e4e4ef;
  --text-dim: #7a7a8e;
  --text-muted: #4a4a5e;
  --green: #00e676;
  --green-soft: #00c853;
  --green-dim: #00e67622;
  --red: #ff5252;
  --red-soft: #ef5350;
  --red-dim: #ff525222;
  --blue: #448aff;
  --amber: #ffd740;
  --purple: #b388ff;
  --cyan: #18ffff;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
.grain { position: fixed; top:0;left:0;right:0;bottom:0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E"); pointer-events:none; z-index:9999; }
.container { max-width: 940px; margin: 0 auto; padding: 40px 20px 80px; }
.header { margin-bottom: 40px; display: flex; justify-content: space-between; align-items: flex-end; }
.header h1 { font-family:'JetBrains Mono',monospace; font-size:14px; font-weight:500; letter-spacing:3px; text-transform:uppercase; color:var(--text-dim); margin-bottom:4px; }
.header .date { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--text-muted); }
.header .refresh-btn { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-muted); background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:6px 14px; cursor:pointer; transition:all 0.2s; }
.header .refresh-btn:hover { color:var(--text); border-color:var(--text-dim); }

.loading { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:400px; gap:24px; }
.loading .spinner { width:40px; height:40px; border:2px solid var(--border); border-top-color:var(--blue); border-radius:50%; animation:spin 1s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.loading p { font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--text-dim); }
.error-box { background:var(--red-dim); border:1px solid #ff525244; border-radius:8px; padding:24px; margin:40px 0; }
.error-box h3 { color:var(--red); font-family:'JetBrains Mono',monospace; font-size:14px; margin-bottom:8px; }
.error-box p { color:var(--text-dim); font-size:14px; line-height:1.6; }

/* Score hero */
.score-hero { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:36px 40px; margin-bottom:20px; position:relative; overflow:hidden; }
.score-hero::before { content:''; position:absolute; top:0;left:0;right:0; height:1px; background:linear-gradient(90deg,transparent,var(--score-color,var(--blue)),transparent); }
.score-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:28px; }
.price-block .price { font-family:'JetBrains Mono',monospace; font-size:32px; font-weight:700; letter-spacing:-1px; }
.price-block .change { font-family:'JetBrains Mono',monospace; font-size:14px; margin-top:4px; }
.vix-atr-block { text-align:right; display:flex; gap:28px; }
.metric-mini .label { font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--text-muted); margin-bottom:2px; }
.metric-mini .value { font-family:'JetBrains Mono',monospace; font-size:22px; font-weight:600; }
.score-main { display:flex; align-items:center; gap:24px; }
.score-number { font-family:'JetBrains Mono',monospace; font-size:64px; font-weight:700; line-height:1; letter-spacing:-3px; }
.score-meta .score-label { font-family:'JetBrains Mono',monospace; font-size:15px; font-weight:600; letter-spacing:2px; text-transform:uppercase; margin-bottom:4px; }
.score-meta .score-prev { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--text-muted); }
.score-bar-container { margin-top:28px; padding-top:20px; border-top:1px solid var(--border); }
.score-bar-labels { display:flex; justify-content:space-between; margin-bottom:8px; }
.score-bar-labels span { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--text-muted); }
.score-bar { height:6px; background:linear-gradient(90deg,var(--red),var(--red-dim) 30%,var(--border) 45%,var(--border) 55%,var(--green-dim) 70%,var(--green)); border-radius:3px; position:relative; }
.score-bar .marker { position:absolute; top:-5px; width:16px; height:16px; background:var(--text); border-radius:50%; transform:translateX(-50%); box-shadow:0 0 12px rgba(255,255,255,0.3); transition:left 0.6s ease; }

/* Cards */
.card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:24px; margin-bottom:20px; }
.card h2 { font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:500; letter-spacing:2px; text-transform:uppercase; color:var(--text-muted); margin-bottom:20px; }
.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px; }

/* Narrative */
.narrative { font-size:15px; line-height:1.75; color:var(--text-dim); margin-bottom:24px; padding-bottom:20px; border-bottom:1px solid var(--border); }
.narrative strong { color:var(--text); font-weight:600; }
.narrative .bull { color:var(--green-soft); }
.narrative .bear { color:var(--red-soft); }

/* Signal groups */
.signal-group { margin-bottom:16px; }
.signal-group:last-child { margin-bottom:0; }
.signal-group-label { font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:600; letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; padding-left:2px; }
.signal-row { display:flex; align-items:center; padding:7px 0; gap:10px; }
.signal-name { font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:500; width:85px; flex-shrink:0; color:var(--text-dim); }
.signal-bar-track { flex:1; height:3px; background:var(--surface2); border-radius:2px; position:relative; }
.signal-bar-fill { position:absolute; top:0; height:100%; border-radius:2px; min-width:2px; }
.signal-bar-fill.positive { left:50%; background:var(--green); }
.signal-bar-fill.negative { right:50%; background:var(--red); }
.signal-bar-center { position:absolute; left:50%; top:-4px; width:1px; height:11px; background:var(--text-muted); opacity:0.3; }
.signal-value { font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:600; width:55px; text-align:right; flex-shrink:0; }
.signal-reading { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-muted); width:65px; text-align:right; flex-shrink:0; }

/* Chart */
.chart-container canvas { display:block; }

/* MA levels */
.ma-row { display:flex; justify-content:space-between; align-items:center; padding:9px 0; border-bottom:1px solid #1e1e2a; }
.ma-row:last-child { border-bottom:none; }
.ma-name { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--text-dim); width:60px; }
.ma-price { font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:500; }
.ma-dist { font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:500; width:80px; text-align:right; }

/* Timeframe cards */
.tf-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
.tf-card { background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:18px; text-align:center; }
.tf-card .tf-period { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-muted); letter-spacing:1px; text-transform:uppercase; margin-bottom:12px; }
.tf-card .tf-winrate { font-family:'JetBrains Mono',monospace; font-size:28px; font-weight:700; margin-bottom:2px; }
.tf-card .tf-label { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--text-muted); letter-spacing:1px; text-transform:uppercase; margin-bottom:10px; }
.tf-card .tf-avg { font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:500; margin-bottom:2px; }
.tf-card .tf-sub { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--text-muted); }
.tf-card .tf-n { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--text-muted); margin-top:8px; }

.footer { margin-top:40px; padding-top:24px; border-top:1px solid var(--border); font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-muted); line-height:1.8; text-align:center; }

.fade-in { animation:fadeIn 0.5s ease both; }
@keyframes fadeIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
.fade-in:nth-child(1){animation-delay:.05s} .fade-in:nth-child(2){animation-delay:.1s} .fade-in:nth-child(3){animation-delay:.15s}
.fade-in:nth-child(4){animation-delay:.2s} .fade-in:nth-child(5){animation-delay:.25s} .fade-in:nth-child(6){animation-delay:.3s}

@media(max-width:640px){
  .grid-2{grid-template-columns:1fr} .tf-grid{grid-template-columns:1fr}
  .score-number{font-size:48px} .price-block .price{font-size:24px}
  .container{padding:24px 16px 60px} .score-hero{padding:24px}
  .vix-atr-block{gap:16px} .signal-reading{display:none}
}
</style>
</head>
<body>
<div class="grain"></div>
<div class="container">
  <div class="header">
    <div><h1>SPX Signal Dashboard</h1><div class="date" id="dateDisplay">Loading...</div></div>
    <button class="refresh-btn" onclick="location.reload()">↻ Refresh</button>
  </div>
  <div class="loading" id="loadingState"><div class="spinner"></div><p>Fetching SPX & VIX data...</p></div>
  <div id="dashboard" style="display:none"></div>
  <div id="errorState" style="display:none"></div>
</div>
<script>
// ============================================================
// SPX Signal Dashboard v2 — Full Engine
// ============================================================

const PROXIES = [
  u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u=>`https://corsproxy.io/?url=${encodeURIComponent(u)}`,
  u=>`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
];

async function fetchJ(url){
  let err;
  for(const p of PROXIES){try{const r=await fetch(p(url));if(!r.ok)throw new Error(`${r.status}`);return await r.json();}catch(e){err=e;}}
  try{const r=await fetch(url);if(r.ok)return await r.json();}catch(e){}
  throw err;
}

async function yahoo(sym,range="2y"){
  const j=await fetchJ(`https://query1.finance.yahoo.com/v8/finance/chart/${sym}?range=${range}&interval=1d`);
  const r=j.chart.result[0],ts=r.timestamp,q=r.indicators.quote[0],ac=r.indicators.adjclose?.[0]?.adjclose||q.close;
  const d=[];for(let i=0;i<ts.length;i++){if(q.close[i]==null)continue;d.push({date:new Date(ts[i]*1000),o:q.open[i],h:q.high[i],l:q.low[i],c:ac[i]||q.close[i],v:q.volume[i]});}return d;
}

// --- Indicators ---
const _ema=(v,p)=>{const k=2/(p+1),r=[v[0]];for(let i=1;i<v.length;i++)r.push(v[i]*k+r[i-1]*(1-k));return r;};
const _sma=(v,p)=>{const r=Array(v.length).fill(null);for(let i=p-1;i<v.length;i++){let s=0;for(let j=i-p+1;j<=i;j++)s+=v[j];r[i]=s/p;}return r;};

function _rsi(c,p){
  const r=Array(c.length).fill(null);if(c.length<p+1)return r;
  let ag=0,al=0;for(let i=1;i<=p;i++){const d=c[i]-c[i-1];d>0?ag+=d:al-=d;}ag/=p;al/=p;
  r[p]=al===0?100:100-100/(1+ag/al);
  for(let i=p+1;i<c.length;i++){const d=c[i]-c[i-1],g=d>0?d:0,l=d<0?-d:0;ag=(ag*(p-1)+g)/p;al=(al*(p-1)+l)/p;r[i]=al===0?100:100-100/(1+ag/al);}return r;
}

function _macd(c){const e12=_ema(c,12),e26=_ema(c,26),line=e12.map((v,i)=>v-e26[i]),sig=_ema(line,9);return{line,sig,hist:line.map((v,i)=>v-sig[i])};}
function _bb(c,p=20,n=2){const ma=_sma(c,p),r=Array(c.length).fill(null);for(let i=p-1;i<c.length;i++){let ss=0;for(let j=i-p+1;j<=i;j++)ss+=(c[j]-ma[i])**2;const s=Math.sqrt(ss/p),u=ma[i]+n*s,lo=ma[i]-n*s;r[i]=(u-lo)===0?.5:(c[i]-lo)/(u-lo);}return r;}
function _atr(d,p=14){const tr=d.map((x,i)=>i===0?x.h-x.l:Math.max(x.h-x.l,Math.abs(x.h-d[i-1].c),Math.abs(x.l-d[i-1].c)));return _sma(tr,p);}

// --- Scorers ---
const cl=(v,lo=-1,hi=1)=>Math.max(lo,Math.min(hi,v));
const sRSI14=v=>v==null?0:v<30?1:v>70?-1:cl(-(v-50)/20);
const sRSI5=v=>v==null?0:cl(-(v-50)/30);
function sMACD(h,arr,i){if(h==null)return 0;const sl=arr.slice(Math.max(0,i-60),i+1).filter(v=>v!=null);if(sl.length<5)return 0;const rng=Math.max(...sl)-Math.min(...sl);return rng===0?0:cl(h/(rng/2));}
const sMA=(s,l)=>(s==null||l==null)?0:s>l?1:-1;
const sBB=v=>v==null?0:cl(-(v-.5)*2);
const sVIX=(c,m)=>(c==null||m==null||m===0)?0:cl(((c-m)/m)*3);
const sVol=(r,ret)=>r==null?0:cl((ret>0?1:ret<0?-1:0)*Math.max(-1,Math.min(1,r-1))*.5);
const sROC=v=>v==null?0:Math.abs(v)>15?-Math.sign(v)*.5:cl(v/10);

const SIGS={
  RSI_5:{w:.7,g:'momentum',lb:'RSI (5d)'},RSI_14:{w:.6,g:'momentum',lb:'RSI (14d)'},
  MACD:{w:.6,g:'momentum',lb:'MACD'},ROC_20:{w:.5,g:'momentum',lb:'Momentum'},
  MA_20_50:{w:.5,g:'trend',lb:'20/50 MA'},MA_50_200:{w:.4,g:'trend',lb:'50/200 MA'},
  Bollinger:{w:.6,g:'mean_rev',lb:'Bollinger'},
  VIX:{w:.8,g:'volatility',lb:'VIX Signal'},
  Volume:{w:.3,g:'confirm',lb:'Volume'},
};
const GROUPS={momentum:{lb:'Momentum',co:'#448aff'},trend:{lb:'Trend',co:'#b388ff'},mean_rev:{lb:'Mean Reversion',co:'#18ffff'},volatility:{lb:'Volatility',co:'#ffd740'},confirm:{lb:'Confirmation',co:'#7a7a8e'}};

async function compute(){
  const[spx,vix]=await Promise.all([yahoo("^GSPC","2y"),yahoo("^VIX","2y")]);
  const vm=new Map();vix.forEach(d=>vm.set(d.date.toISOString().slice(0,10),d.c));
  const data=spx.map(d=>({...d,ds:d.date.toISOString().slice(0,10),vx:vm.get(d.date.toISOString().slice(0,10))||null}));
  for(let i=1;i<data.length;i++)if(data[i].vx==null)data[i].vx=data[i-1].vx;

  const C=data.map(d=>d.c),V=data.map(d=>d.v),VX=data.map(d=>d.vx);
  const r14=_rsi(C,14),r5=_rsi(C,5),mc=_macd(C),ma10=_sma(C,10),ma20=_sma(C,20),ma50=_sma(C,50),ma200=_sma(C,200);
  const bb=_bb(C),vm20=_sma(V,20),vxm20=_sma(VX,20),at=_atr(data);

  function scAt(i){return{
    RSI_5:sRSI5(r5[i]),RSI_14:sRSI14(r14[i]),MACD:sMACD(mc.hist[i],mc.hist,i),
    ROC_20:sROC(i>=20?(C[i]/C[i-20]-1)*100:null),MA_20_50:sMA(ma20[i],ma50[i]),
    MA_50_200:sMA(ma50[i],ma200[i]),Bollinger:sBB(bb[i]),
    VIX:sVIX(VX[i],vxm20[i]),Volume:sVol(vm20[i]?V[i]/vm20[i]:null,i>0?(C[i]-C[i-1])/C[i-1]:0),
  };}
  function comp(s){let t=0;for(const[n,c]of Object.entries(SIGS))t+=(s[n]||0)*c.w;return t;}

  const i=data.length-1,ip=data.length-2;
  const sigs=scAt(i),prevSigs=scAt(ip);
  const sc=Math.round(comp(sigs)*100)/100,psc=Math.round(comp(prevSigs)*100)/100;

  const raw={
    RSI_5:r5[i]!=null?r5[i].toFixed(1):'-',RSI_14:r14[i]!=null?r14[i].toFixed(1):'-',
    MACD:mc.hist[i]!=null?mc.hist[i].toFixed(2):'-',
    ROC_20:i>=20?((C[i]/C[i-20]-1)*100).toFixed(1)+'%':'-',
    MA_20_50:ma20[i]&&ma50[i]?(ma20[i]>ma50[i]?'Above':'Below'):'-',
    MA_50_200:ma50[i]&&ma200[i]?(ma50[i]>ma200[i]?'Above':'Below'):'-',
    Bollinger:bb[i]!=null?(bb[i]*100).toFixed(0)+'%':'-',
    VIX:VX[i]!=null?VX[i].toFixed(1):'-',
    Volume:vm20[i]?(V[i]/vm20[i]).toFixed(2)+'x':'-',
  };

  // Multi-timeframe historical context
  const ctx={};
  for(const hp of[5,10,20]){
    const sim=[];
    for(let j=200;j<data.length-hp;j++){const s=comp(scAt(j));if(Math.abs(s-sc)<=.75)sim.push((C[j+hp]/C[j]-1)*100);}
    if(sim.length>=10){sim.sort((a,b)=>a-b);ctx[hp]={n:sim.length,wr:(sim.filter(r=>r>0).length/sim.length*100).toFixed(1),avg:(sim.reduce((a,v)=>a+v,0)/sim.length).toFixed(2),med:sim[Math.floor(sim.length/2)].toFixed(2),worst:sim[0].toFixed(1),best:sim[sim.length-1].toFixed(1)};}
  }

  const candles=data.slice(-60).map(d=>({ds:d.ds,o:d.o,h:d.h,l:d.l,c:d.c}));
  const cMAs={ma10:ma10.slice(-60),ma20:ma20.slice(-60),ma50:ma50.slice(-60)};

  return{date:data[i].ds,price:C[i],chg:(C[i]-C[ip])/C[ip]*100,vix:VX[i],atr:at[i]?(at[i]/C[i]*100):null,composite:sc,prev:psc,sigs,raw,mas:{MA_10:ma10[i],MA_20:ma20[i],MA_50:ma50[i],MA_200:ma200[i]},ctx,candles,cMAs};
}

// --- Candlestick chart ---
function drawChart(id,candles,mas){
  const cvs=document.createElement('canvas');
  const dpr=window.devicePixelRatio||1;
  const W=Math.min(890,document.getElementById(id).clientWidth);
  const H=280;
  cvs.width=W*dpr;cvs.height=H*dpr;cvs.style.width=W+'px';cvs.style.height=H+'px';
  const cx=cvs.getContext('2d');cx.scale(dpr,dpr);
  const pad={t:20,r:12,b:28,l:58},cw=W-pad.l-pad.r,ch=H-pad.t-pad.b;
  let mn=Infinity,mx=-Infinity;
  candles.forEach(c=>{mn=Math.min(mn,c.l);mx=Math.max(mx,c.h);});
  const rng=mx-mn;mn-=rng*.05;mx+=rng*.05;const pr=mx-mn;
  const y=p=>pad.t+ch-((p-mn)/pr*ch), gap=cw/candles.length, bw=Math.max(2,gap*.65);

  // Grid
  cx.strokeStyle='#1a1a26';cx.lineWidth=1;
  for(let g=0;g<=5;g++){const py=pad.t+(ch/5)*g;cx.beginPath();cx.moveTo(pad.l,py);cx.lineTo(W-pad.r,py);cx.stroke();cx.fillStyle='#4a4a5e';cx.font='10px JetBrains Mono';cx.textAlign='right';cx.fillText((mx-(pr/5)*g).toFixed(0),pad.l-8,py+3);}

  // Date labels
  cx.fillStyle='#4a4a5e';cx.font='9px JetBrains Mono';cx.textAlign='center';
  for(let i=0;i<candles.length;i+=10){const x=pad.l+i*gap+gap/2;const p=candles[i].ds.split('-');cx.fillText(`${p[1]}/${p[2]}`,x,H-6);}

  // MAs
  const maCols={ma10:'rgba(68,138,255,0.4)',ma20:'rgba(255,215,64,0.5)',ma50:'rgba(179,136,255,0.5)'};
  for(const[k,col]of Object.entries(maCols)){const v=mas[k];cx.strokeStyle=col;cx.lineWidth=1.5;cx.beginPath();let s=false;
    for(let i=0;i<v.length;i++){if(v[i]==null)continue;const x=pad.l+i*gap+gap/2;if(!s){cx.moveTo(x,y(v[i]));s=true;}else cx.lineTo(x,y(v[i]));}cx.stroke();}

  // Candles
  for(let i=0;i<candles.length;i++){
    const c=candles[i],x=pad.l+i*gap+gap/2,up=c.c>=c.o,col=up?'#00e676':'#ff5252';
    cx.strokeStyle=col;cx.lineWidth=1;cx.beginPath();cx.moveTo(x,y(c.h));cx.lineTo(x,y(c.l));cx.stroke();
    const bt=y(Math.max(c.o,c.c)),bb=y(Math.min(c.o,c.c));
    cx.fillStyle=col;cx.fillRect(x-bw/2,bt,bw,Math.max(1,bb-bt));
  }

  // Legend
  let lx=pad.l+4;
  [{l:'10 MA',c:'rgba(68,138,255,0.6)'},{l:'20 MA',c:'rgba(255,215,64,0.6)'},{l:'50 MA',c:'rgba(179,136,255,0.6)'}].forEach(m=>{
    cx.fillStyle=m.c;cx.fillRect(lx,pad.t-12,14,2);cx.fillStyle='#7a7a8e';cx.font='9px JetBrains Mono';cx.textAlign='left';cx.fillText(m.l,lx+18,pad.t-8);lx+=68;
  });

  document.getElementById(id).appendChild(cvs);
}

// --- Narrative ---
function narrative(sigs,raw,sc){
  const bu=[],be=[];
  if(sigs.RSI_5>.3)bu.push(`short-term RSI is oversold at ${raw.RSI_5}`);else if(sigs.RSI_5<-.3)be.push(`short-term RSI is overbought at ${raw.RSI_5}`);
  if(sigs.RSI_14>.3)bu.push(`14-day RSI confirms oversold at ${raw.RSI_14}`);else if(sigs.RSI_14<-.3)be.push(`14-day RSI shows overbought at ${raw.RSI_14}`);
  if(sigs.MACD>.3)bu.push('MACD is accelerating upward');else if(sigs.MACD<-.3)be.push('MACD is pointing down');
  if(sigs.MA_20_50>0)bu.push('20-day MA is above the 50-day');else be.push('20-day MA is below the 50-day');
  if(sigs.MA_50_200>0)bu.push('longer-term trend is up (50 > 200 MA)');else be.push('50-day has crossed below 200-day MA');
  if(sigs.Bollinger>.3)bu.push('price is near the lower Bollinger Band');else if(sigs.Bollinger<-.3)be.push('price is stretched toward upper Bollinger Band');
  if(sigs.VIX>.3)bu.push(`VIX at ${raw.VIX} is elevated — historically a contrarian buy signal`);else if(sigs.VIX<-.3)be.push('VIX is low, suggesting complacency');

  let t='';
  if(bu.length)t+=`<strong>Bullish:</strong> <span class="bull">${bu.join(', ')}</span>. `;
  if(be.length)t+=`<strong>Bearish:</strong> <span class="bear">${be.join(', ')}</span>. `;
  if(sc>2)t+='Multiple signals aligned bullish — higher-conviction setup.';
  else if(sc>.5)t+='Leans slightly bullish, but the picture is mixed.';
  else if(sc>-.5)t+='Signals are conflicting — no clear edge right now.';
  else if(sc>-2)t+='Modestly bearish lean. Caution on new longs.';
  else t+='Multiple signals aligned bearish — risk-off reading.';
  return t;
}

// --- Score helpers ---
function sLabel(s){return s>=3.5?'STRONGLY BULLISH':s>=2?'BULLISH':s>=.5?'SLIGHTLY BULLISH':s>=-.5?'NEUTRAL':s>=-2?'SLIGHTLY BEARISH':s>=-3.5?'BEARISH':'STRONGLY BEARISH';}
function sColor(s){return s>=2?'var(--green)':s>=.5?'#66bb6a':s>=-.5?'var(--text-dim)':s>=-2?'#ef5350':'var(--red)';}

// --- Render ---
function render(r){
  const col=sColor(r.composite),cCol=r.chg>=0?'var(--green)':'var(--red)',bp=((r.composite+5)/10*100).toFixed(1),sc=r.composite-r.prev;

  // Signal groups
  const grps={};for(const[n,c]of Object.entries(SIGS)){if(!grps[c.g])grps[c.g]=[];grps[c.g].push({n,lb:c.lb,raw:r.sigs[n],w:c.w,co:r.sigs[n]*c.w,rd:r.raw[n]});}
  let sigHTML='';
  for(const[gk,items]of Object.entries(grps)){const gm=GROUPS[gk];items.sort((a,b)=>Math.abs(b.co)-Math.abs(a.co));
    sigHTML+=`<div class="signal-group"><div class="signal-group-label" style="color:${gm.co}">${gm.lb}</div>`;
    for(const s of items){const bw=Math.abs(s.co)/.8*50,cls=s.co>=0?'positive':'negative',vc=s.co>=0?'var(--green)':'var(--red)';
      sigHTML+=`<div class="signal-row"><span class="signal-name">${s.lb}</span><div class="signal-bar-track"><div class="signal-bar-center"></div><div class="signal-bar-fill ${cls}" style="width:${bw}%"></div></div><span class="signal-reading">${s.rd}</span><span class="signal-value" style="color:${vc}">${s.co>=0?'+':''}${s.co.toFixed(3)}</span></div>`;}
    sigHTML+='</div>';}

  const maHTML=Object.entries(r.mas).map(([n,v])=>{if(!v)return'';const d=(r.price-v)/v*100;return`<div class="ma-row"><span class="ma-name">${n}</span><span class="ma-price">${v.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}</span><span class="ma-dist" style="color:${d>=0?'var(--green)':'var(--red)'}">${d>=0?'+':''}${d.toFixed(1)}% ${d>=0?'▲':'▼'}</span></div>`;}).join('');

  const tfHTML=[5,10,20].map(hp=>{const c=r.ctx[hp];if(!c)return`<div class="tf-card"><div class="tf-period">${hp}-Day</div><div style="color:var(--text-muted);font-size:12px">Insufficient data</div></div>`;
    const wc=parseFloat(c.wr)>55?'var(--green)':parseFloat(c.wr)<45?'var(--red)':'var(--text)',ac=parseFloat(c.avg)>=0?'var(--green)':'var(--red)';
    return`<div class="tf-card"><div class="tf-period">${hp}-Day Hold</div><div class="tf-winrate" style="color:${wc}">${c.wr}%</div><div class="tf-label">Win Rate</div><div class="tf-avg" style="color:${ac}">${parseFloat(c.avg)>=0?'+':''}${c.avg}% avg</div><div class="tf-sub">median ${c.med}%</div><div class="tf-n">${c.n} occurrences</div></div>`;}).join('');

  const nar=narrative(r.sigs,r.raw,r.composite);

  document.getElementById('dashboard').innerHTML=`
    <div class="score-hero fade-in" style="--score-color:${col}">
      <div class="score-top">
        <div class="price-block"><div class="price">${r.price.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}</div><div class="change" style="color:${cCol}">${r.chg>=0?'+':''}${r.chg.toFixed(2)}%</div></div>
        <div class="vix-atr-block">
          <div class="metric-mini"><div class="label">ATR</div><div class="value" style="color:var(--text-dim)">${r.atr?r.atr.toFixed(2)+'%':'—'}</div></div>
          <div class="metric-mini"><div class="label">VIX</div><div class="value" style="color:var(--amber)">${r.vix?r.vix.toFixed(2):'—'}</div></div>
        </div>
      </div>
      <div class="score-main">
        <div class="score-number" style="color:${col}">${r.composite>=0?'+':''}${r.composite.toFixed(2)}</div>
        <div class="score-meta"><div class="score-label" style="color:${col}">${sLabel(r.composite)}</div><div class="score-prev">prev ${r.prev>=0?'+':''}${r.prev.toFixed(2)} · chg ${sc>=0?'+':''}${sc.toFixed(2)}</div></div>
      </div>
      <div class="score-bar-container"><div class="score-bar-labels"><span>-5 Bearish</span><span>Neutral</span><span>Bullish +5</span></div><div class="score-bar"><div class="marker" style="left:${bp}%"></div></div></div>
    </div>

    <div class="card fade-in"><h2>What the Signals Are Saying</h2><div class="narrative">${nar}</div>${sigHTML}</div>

    <div class="card fade-in"><h2>60-Day Price Action</h2><div class="chart-container" id="cc"></div></div>

    <div class="card fade-in"><h2>Historical Context — Score ~${r.composite.toFixed(1)}</h2><div class="tf-grid">${tfHTML}</div></div>

    <div class="grid-2 fade-in">
      <div class="card"><h2>Key Levels</h2>${maHTML}</div>
      <div class="card"><h2>Reading the Score</h2><div style="font-size:13px;line-height:1.7;color:var(--text-dim)">
        <strong style="color:var(--green)">+3 to +5</strong> — Strong bullish alignment<br>
        <strong style="color:#66bb6a">+1 to +3</strong> — Lean bullish<br>
        <strong style="color:var(--text-dim)">-1 to +1</strong> — Neutral / mixed<br>
        <strong style="color:#ef5350">-3 to -1</strong> — Lean bearish<br>
        <strong style="color:var(--red)">-5 to -3</strong> — Strong bearish alignment<br>
        <br><span style="font-size:11px">Win rates above 55% with 50+ occurrences suggest a meaningful edge.</span>
      </div></div>
    </div>

    <div class="footer fade-in">Research tool — not financial advice. Use proper risk management.<br>Data from Yahoo Finance · Computed client-side</div>`;

  document.getElementById('dashboard').style.display='block';
  drawChart('cc',r.candles,r.cMAs);
}

// --- Init ---
async function init(){
  document.getElementById('dateDisplay').textContent=new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  try{const r=await compute();document.getElementById('loadingState').style.display='none';render(r);}
  catch(e){console.error(e);document.getElementById('loadingState').style.display='none';document.getElementById('errorState').innerHTML=`<div class="error-box"><h3>Failed to load data</h3><p>${e.message}<br><br>Try refreshing or disabling ad blockers on this page.</p></div>`;document.getElementById('errorState').style.display='block';}
}
init();
</script>

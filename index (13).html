<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPX Signal Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --surface2: #1a1a26;
  --border: #2a2a3a;
  --text: #e4e4ef;
  --text-dim: #7a7a8e;
  --text-muted: #4a4a5e;
  --green: #00e676;
  --green-dim: #00e67622;
  --red: #ff5252;
  --red-dim: #ff525222;
  --blue: #448aff;
  --blue-dim: #448aff22;
  --amber: #ffd740;
  --amber-dim: #ffd74022;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

.grain {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
}

.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 40px 20px 80px;
}

.header {
  margin-bottom: 48px;
}

.header h1 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 8px;
}

.header .date {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: var(--text-muted);
}

/* Loading state */
.loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 400px;
  gap: 24px;
}

.loading .spinner {
  width: 40px;
  height: 40px;
  border: 2px solid var(--border);
  border-top-color: var(--blue);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.loading p {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: var(--text-dim);
}

/* Error state */
.error-box {
  background: var(--red-dim);
  border: 1px solid #ff525244;
  border-radius: 8px;
  padding: 24px;
  margin: 40px 0;
}

.error-box h3 {
  color: var(--red);
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  margin-bottom: 8px;
}

.error-box p {
  color: var(--text-dim);
  font-size: 14px;
  line-height: 1.6;
}

/* Score hero */
.score-hero {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px;
  margin-bottom: 24px;
  position: relative;
  overflow: hidden;
}

.score-hero::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--score-color, var(--blue)), transparent);
}

.score-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 32px;
}

.price-block .price {
  font-family: 'JetBrains Mono', monospace;
  font-size: 32px;
  font-weight: 700;
  letter-spacing: -1px;
}

.price-block .change {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  margin-top: 4px;
}

.vix-block {
  text-align: right;
}

.vix-block .label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 4px;
}

.vix-block .value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 24px;
  font-weight: 600;
  color: var(--amber);
}

.score-main {
  display: flex;
  align-items: center;
  gap: 24px;
}

.score-number {
  font-family: 'JetBrains Mono', monospace;
  font-size: 64px;
  font-weight: 700;
  line-height: 1;
  letter-spacing: -3px;
}

.score-meta .score-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 4px;
}

.score-meta .score-prev {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--text-muted);
}

/* Score bar with alert zones */
.score-bar-container {
  margin-top: 32px;
  padding-top: 24px;
  border-top: 1px solid var(--border);
}

.score-bar-labels {
  display: flex;
  justify-content: space-between;
  margin-bottom: 4px;
}

.score-bar-labels span {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-muted);
}

.score-bar-zones {
  display: flex;
  margin-bottom: 6px;
  gap: 2px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.zone {
  text-align: center;
  padding: 3px 0;
  border-radius: 3px;
  color: var(--text-muted);
}

.zone-short   { flex: 2; background: rgba(255,82,82,0.15); color: var(--red); }
.zone-caution-bear { flex: 1.5; background: rgba(255,82,82,0.07); }
.zone-neutral { flex: 3; background: var(--surface2); }
.zone-caution-bull { flex: 1.5; background: rgba(0,230,118,0.07); }
.zone-long    { flex: 2; background: rgba(0,230,118,0.15); color: var(--green); }

.score-bar {
  height: 6px;
  background: linear-gradient(90deg, var(--red), var(--red-dim) 30%, var(--border) 45%, var(--border) 55%, var(--green-dim) 70%, var(--green));
  border-radius: 3px;
  position: relative;
}

.score-bar .marker {
  position: absolute;
  top: -5px;
  width: 16px;
  height: 16px;
  background: var(--text);
  border-radius: 50%;
  transform: translateX(-50%);
  box-shadow: 0 0 12px rgba(255,255,255,0.3);
  transition: left 0.6s ease;
}

/* Trade Setup */
.trade-setup {
  margin-top: 16px;
  margin-bottom: 24px;
  border-radius: 12px;
  overflow: hidden;
}

.trade-setup-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 16px 20px;
  font-family: 'JetBrains Mono', monospace;
}

.trade-setup-header .setup-icon {
  font-size: 18px;
}

.trade-setup-header .setup-direction {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
}

.trade-setup-header .setup-subtitle {
  font-size: 11px;
  color: var(--text-dim);
  margin-left: auto;
}

.setup-long .trade-setup-header {
  background: rgba(0, 230, 118, 0.1);
  border: 1px solid rgba(0, 230, 118, 0.2);
  border-radius: 12px 12px 0 0;
}

.setup-short .trade-setup-header {
  background: rgba(255, 82, 82, 0.1);
  border: 1px solid rgba(255, 82, 82, 0.2);
  border-radius: 12px 12px 0 0;
}

.setup-wait .trade-setup-header {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px 12px 0 0;
}

.trade-setup-body {
  padding: 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 12px 12px;
}

.setup-levels {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 16px;
  margin-bottom: 16px;
}

@media (max-width: 640px) {
  .setup-levels { grid-template-columns: 1fr; gap: 12px; }
}

.setup-level {
  text-align: center;
  padding: 14px;
  border-radius: 8px;
  background: var(--surface2);
}

.setup-level .level-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 6px;
}

.setup-level .level-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 20px;
  font-weight: 700;
}

.setup-level .level-detail {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 4px;
}

.setup-options-hint {
  padding: 14px;
  background: var(--surface2);
  border-radius: 8px;
  font-size: 13px;
  line-height: 1.6;
  color: var(--text-dim);
}

.setup-options-hint strong {
  color: var(--text);
}

.setup-wait-msg {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: var(--text-dim);
  line-height: 1.7;
  padding: 8px 0;
}

/* Score bucket reference table */
.bucket-table {
  width: 100%;
  border-collapse: collapse;
}

.bucket-table th {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-muted);
  text-align: left;
  padding: 8px 10px;
  border-bottom: 1px solid var(--border);
}

.bucket-table th:not(:first-child) {
  text-align: right;
}

.bucket-table td {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  padding: 10px 10px;
  border-bottom: 1px solid var(--border);
}

.bucket-table td:not(:first-child) {
  text-align: right;
}

.bucket-table tr:last-child td {
  border-bottom: none;
}

.bucket-table tr.current-bucket td {
  background: rgba(68, 138, 255, 0.08);
}

.bucket-label {
  color: var(--text-dim);
}

.bucket-tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}

/* Cards grid */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 24px;
}

@media (max-width: 640px) {
  .grid { grid-template-columns: 1fr; }
  .score-number { font-size: 48px; }
  .price-block .price { font-size: 24px; }
  .container { padding: 24px 16px 60px; }
  .score-hero { padding: 24px; }
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
}

.card.full { grid-column: 1 / -1; }

.card h2 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 20px;
}

/* Signal breakdown */
.signal-group {
  margin-bottom: 24px;
}

.signal-group:last-child { margin-bottom: 0; }

.signal-group-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
}

.signal-group-icon {
  font-size: 16px;
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 6px;
  background: var(--surface2);
  flex-shrink: 0;
}

.signal-group-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-dim);
}

.signal-group-verdict {
  margin-left: auto;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 4px;
}

.verdict-bullish {
  color: var(--green);
  background: var(--green-dim);
}

.verdict-bearish {
  color: var(--red);
  background: var(--red-dim);
}

.verdict-neutral {
  color: var(--text-dim);
  background: var(--surface2);
}

.signal-row {
  display: flex;
  align-items: center;
  padding: 8px 0 8px 38px;
  border-bottom: 1px solid var(--border);
  gap: 12px;
}

.signal-row:last-child { border-bottom: none; }

.signal-name {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 400;
  color: var(--text-dim);
  width: 80px;
  flex-shrink: 0;
}

.signal-bar-track {
  flex: 1;
  height: 4px;
  background: var(--surface2);
  border-radius: 2px;
  position: relative;
  overflow: visible;
}

.signal-bar-fill {
  position: absolute;
  top: 0;
  height: 100%;
  border-radius: 2px;
  transition: width 0.6s ease;
  min-width: 2px;
}

.signal-bar-fill.positive {
  left: 50%;
  background: var(--green);
}

.signal-bar-fill.negative {
  right: 50%;
  background: var(--red);
}

.signal-bar-center {
  position: absolute;
  left: 50%;
  top: -3px;
  width: 1px;
  height: 10px;
  background: var(--text-muted);
}

.signal-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 600;
  width: 55px;
  text-align: right;
  flex-shrink: 0;
}

/* Narrative */
.narrative {
  background: var(--surface2);
  border-radius: 10px;
  padding: 20px;
  margin-bottom: 24px;
  border-left: 3px solid;
}

.narrative p {
  font-size: 14px;
  line-height: 1.7;
  color: var(--text);
}

.narrative .narrative-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 10px;
}

/* MA levels */
.ma-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}

.ma-row:last-child { border-bottom: none; }

.ma-name {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: var(--text-dim);
  width: 60px;
}

.ma-price {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  font-weight: 500;
}

.ma-dist {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 500;
  width: 80px;
  text-align: right;
}

/* Historical context */
.context-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 16px;
}

@media (max-width: 640px) {
  .context-grid { grid-template-columns: 1fr 1fr; }
}

.context-stat .stat-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 2px;
}

.context-stat .stat-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 1px;
  text-transform: uppercase;
}

/* Footer */
.hold-tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
}

.hold-tab {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 500;
  padding: 6px 14px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.2s;
}

.hold-tab:hover {
  border-color: var(--text-dim);
  color: var(--text);
}

.hold-tab.active {
  background: var(--blue-dim);
  border-color: var(--blue);
  color: var(--blue);
}

.context-panel {
  display: none;
}

.context-panel.active {
  display: block;
}

.footer {
  margin-top: 48px;
  padding-top: 24px;
  border-top: 1px solid var(--border);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-muted);
  line-height: 1.8;
  text-align: center;
}

/* Fade in animation */
.fade-in {
  animation: fadeIn 0.5s ease both;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.fade-in:nth-child(1) { animation-delay: 0.05s; }
.fade-in:nth-child(2) { animation-delay: 0.1s; }
.fade-in:nth-child(3) { animation-delay: 0.15s; }
.fade-in:nth-child(4) { animation-delay: 0.2s; }
.fade-in:nth-child(5) { animation-delay: 0.25s; }
.fade-in:nth-child(6) { animation-delay: 0.3s; }
</style>

<body>
<div class="grain"></div>
<div class="container" id="app">
  <div class="header">
    <h1>SPX Signal Dashboard</h1>
    <div class="date" id="dateDisplay">Loading...</div>
  </div>
  <div class="loading" id="loadingState">
    <div class="spinner"></div>
    <p id="loadingMsg">Fetching SPX & VIX data...</p>
  </div>
  <div id="dashboard" style="display:none;"></div>
  <div id="errorState" style="display:none;"></div>
</div>

<script>
// ============================================================
// SPX Signal Dashboard V5 — Regime-Aware Scoring Engine
// ============================================================

// --- Data fetching ---
function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

async function tryFetch(url, timeoutMs = 8000) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  try {
    const resp = await fetch(url, { signal: controller.signal });
    clearTimeout(timer);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const text = await resp.text();
    if (!text.trim().startsWith('{') && !text.trim().startsWith('[')) throw new Error('Not JSON');
    return JSON.parse(text);
  } catch(e) { clearTimeout(timer); throw e; }
}

async function fetchYahooData(symbol, range = "2y", interval = "1d") {
  const y1 = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?range=${range}&interval=${interval}`;
  const y2 = `https://query2.finance.yahoo.com/v8/finance/chart/${symbol}?range=${range}&interval=${interval}`;
  const strategies = [
    () => tryFetch(`https://corsproxy.io/?url=${encodeURIComponent(y1)}`),
    () => tryFetch(`https://corsproxy.io/?url=${encodeURIComponent(y2)}`),
    () => tryFetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(y1)}`),
    () => tryFetch(`https://corsproxy.org/?url=${encodeURIComponent(y1)}`),
    () => tryFetch(y1), () => tryFetch(y2),
  ];
  let lastError;
  for (let i = 0; i < strategies.length; i++) {
    try {
      if (i > 0) await delay(300);
      const json = await strategies[i]();
      if (json?.chart?.result?.[0]) {
        const r = json.chart.result[0], q = r.indicators.quote[0];
        const ac = r.indicators.adjclose?.[0]?.adjclose || q.close;
        const data = [];
        for (let j = 0; j < r.timestamp.length; j++) {
          if (q.close[j] == null) continue;
          data.push({ date: new Date(r.timestamp[j]*1000), open: q.open[j], high: q.high[j], low: q.low[j], close: ac[j]||q.close[j], volume: q.volume[j] });
        }
        if (data.length > 50) return data;
      }
    } catch(e) { lastError = e; }
  }
  throw new Error(`Unable to fetch ${symbol}. ${lastError?.message || ''}`);
}

// --- Technical Indicators ---
function computeSMA(values, period) {
  const sma = new Array(values.length).fill(null);
  for (let i = period-1; i < values.length; i++) {
    let sum = 0; for (let j = i-period+1; j <= i; j++) sum += values[j];
    sma[i] = sum / period;
  }
  return sma;
}

function computeEMA(values, period) {
  const k = 2/(period+1), ema = [values[0]];
  for (let i = 1; i < values.length; i++) ema.push(values[i]*k + ema[i-1]*(1-k));
  return ema;
}

function computeRSI(closes, period) {
  const rsi = new Array(closes.length).fill(null);
  if (closes.length < period+1) return rsi;
  let aG = 0, aL = 0;
  for (let i = 1; i <= period; i++) { const d = closes[i]-closes[i-1]; if (d>0) aG+=d; else aL-=d; }
  aG/=period; aL/=period;
  rsi[period] = aL===0 ? 100 : 100-100/(1+aG/aL);
  for (let i = period+1; i < closes.length; i++) {
    const d = closes[i]-closes[i-1], g = d>0?d:0, l = d<0?-d:0;
    aG = (aG*(period-1)+g)/period; aL = (aL*(period-1)+l)/period;
    rsi[i] = aL===0 ? 100 : 100-100/(1+aG/aL);
  }
  return rsi;
}

function computeMACD(closes) {
  const e12 = computeEMA(closes,12), e26 = computeEMA(closes,26);
  const line = e12.map((v,i)=>v-e26[i]), sig = computeEMA(line,9);
  return { line, signal: sig, histogram: line.map((v,i)=>v-sig[i]) };
}

function computeBollinger(closes, period=20, nStd=2) {
  const sma = computeSMA(closes,period), pctB = new Array(closes.length).fill(null);
  const upper = new Array(closes.length).fill(null), lower = new Array(closes.length).fill(null);
  for (let i = period-1; i < closes.length; i++) {
    let ss = 0; for (let j = i-period+1; j <= i; j++) ss += (closes[j]-sma[i])**2;
    const std = Math.sqrt(ss/period);
    upper[i] = sma[i]+nStd*std; lower[i] = sma[i]-nStd*std;
    pctB[i] = (upper[i]-lower[i])===0 ? 0.5 : (closes[i]-lower[i])/(upper[i]-lower[i]);
  }
  return { pctB, upper, lower };
}

function computeWilliamsR(highs, lows, closes, period=14) {
  const wr = new Array(closes.length).fill(null);
  for (let i = period-1; i < closes.length; i++) {
    let hi=-Infinity, lo=Infinity;
    for (let j=i-period+1;j<=i;j++) { if(highs[j]>hi)hi=highs[j]; if(lows[j]<lo)lo=lows[j]; }
    wr[i] = hi===lo ? -50 : -100*(hi-closes[i])/(hi-lo);
  }
  return wr;
}

function computeStochastic(highs, lows, closes, kPeriod=14, dPeriod=3) {
  const k = new Array(closes.length).fill(null);
  for (let i = kPeriod-1; i < closes.length; i++) {
    let hi=-Infinity, lo=Infinity;
    for (let j=i-kPeriod+1;j<=i;j++) { if(highs[j]>hi)hi=highs[j]; if(lows[j]<lo)lo=lows[j]; }
    k[i] = hi===lo ? 50 : 100*(closes[i]-lo)/(hi-lo);
  }
  const d = computeSMA(k.map(v=>v??50), dPeriod);
  return { k, d };
}

function computeADX(highs, lows, closes, period=14) {
  const n = closes.length;
  const plusDI = new Array(n).fill(null), minusDI = new Array(n).fill(null), adx = new Array(n).fill(null);
  if (n < period*2) return { adx, plusDI, minusDI };

  const tr=[], pdm=[], mdm=[];
  for (let i = 0; i < n; i++) {
    if (i===0) { tr.push(highs[i]-lows[i]); pdm.push(0); mdm.push(0); continue; }
    tr.push(Math.max(highs[i]-lows[i], Math.abs(highs[i]-closes[i-1]), Math.abs(lows[i]-closes[i-1])));
    const up = highs[i]-highs[i-1], down = lows[i-1]-lows[i];
    pdm.push(up>down&&up>0 ? up : 0);
    mdm.push(down>up&&down>0 ? down : 0);
  }

  // Smoothed
  let aTR=0, aPDM=0, aMDM=0;
  for (let i=0;i<period;i++) { aTR+=tr[i]; aPDM+=pdm[i]; aMDM+=mdm[i]; }
  const alpha = 1/period;
  for (let i = period; i < n; i++) {
    aTR = aTR*(1-alpha)+tr[i]; aPDM = aPDM*(1-alpha)+pdm[i]; aMDM = aMDM*(1-alpha)+mdm[i];
    const pdi = aTR?100*aPDM/aTR:0, mdi = aTR?100*aMDM/aTR:0;
    plusDI[i] = pdi; minusDI[i] = mdi;
    const dx = (pdi+mdi)?100*Math.abs(pdi-mdi)/(pdi+mdi):0;
    adx[i] = i===period ? dx : (adx[i-1]??dx)*(1-alpha)+dx*alpha;
  }
  return { adx, plusDI, minusDI };
}

function computeCCI(highs, lows, closes, period=20) {
  const cci = new Array(closes.length).fill(null);
  for (let i = period-1; i < closes.length; i++) {
    let sumTP=0;
    for (let j=i-period+1;j<=i;j++) sumTP+=(highs[j]+lows[j]+closes[j])/3;
    const meanTP = sumTP/period;
    let sumDev=0;
    for (let j=i-period+1;j<=i;j++) sumDev+=Math.abs((highs[j]+lows[j]+closes[j])/3-meanTP);
    const mad = sumDev/period;
    const tp = (highs[i]+lows[i]+closes[i])/3;
    cci[i] = mad===0 ? 0 : (tp-meanTP)/(0.015*mad);
  }
  return cci;
}

function computeMFI(highs, lows, closes, volumes, period=14) {
  const mfi = new Array(closes.length).fill(null);
  for (let i = period; i < closes.length; i++) {
    let posFlow=0, negFlow=0;
    for (let j=i-period+1;j<=i;j++) {
      const tp = (highs[j]+lows[j]+closes[j])/3;
      const prevTp = (highs[j-1]+lows[j-1]+closes[j-1])/3;
      const mf = tp*volumes[j];
      if (tp>prevTp) posFlow+=mf; else negFlow+=mf;
    }
    mfi[i] = negFlow===0 ? 100 : 100-100/(1+posFlow/negFlow);
  }
  return mfi;
}

function computeATR(highs, lows, closes, period=14) {
  const atr = new Array(closes.length).fill(null);
  const tr = highs.map((h,i) => i===0 ? h-lows[i] : Math.max(h-lows[i], Math.abs(h-closes[i-1]), Math.abs(lows[i]-closes[i-1])));
  return computeSMA(tr, period);
}

// --- V5 Regime Classification ---
function classifyRegime(ma50, ma200, adx, plusDI, minusDI, vixClose, vixMA20, vixPctile80) {
  if (ma50!=null && ma200!=null && adx!=null) {
    if (ma50>ma200 && adx>20 && plusDI>minusDI) return "BULL_TREND";
    if (ma50<ma200 && adx>20 && minusDI>plusDI) return "BEAR_TREND";
  }
  if (vixClose!=null && vixPctile80!=null && vixClose>vixPctile80) return "HIGH_VOL";
  return "CHOPPY";
}

// --- V5 Sub-Scores ---
function scoreMeanReversion(rsi5, rsi14, willR, stochK, mfi, pctB, cci) {
  const scores = [], weights = [];
  if (rsi5!=null) { scores.push(Math.max(-1,Math.min(1,-(rsi5-50)/25))); weights.push(1.0); }
  if (willR!=null) { scores.push(Math.max(-1,Math.min(1,-(willR+50)/25))); weights.push(0.9); }
  if (stochK!=null) { scores.push(Math.max(-1,Math.min(1,-(stochK-50)/25))); weights.push(0.8); }
  if (mfi!=null) { scores.push(Math.max(-1,Math.min(1,-(mfi-50)/25))); weights.push(0.8); }
  if (pctB!=null) { scores.push(Math.max(-1,Math.min(1,-(pctB-0.5)*2))); weights.push(0.7); }
  if (cci!=null) { scores.push(Math.max(-1,Math.min(1,-cci/150))); weights.push(0.6); }
  if (rsi14!=null) { scores.push(Math.max(-1,Math.min(1,-(rsi14-50)/20))); weights.push(0.6); }
  if (!scores.length) return 0;
  const tw = weights.reduce((a,b)=>a+b,0);
  return scores.reduce((s,v,i)=>s+v*weights[i],0)/tw;
}

function scoreMomentum(macdHist, macdHistArr, idx, ma20, ma50, roc20, stochK, stochD) {
  const scores = [], weights = [];
  if (macdHist!=null && macdHistArr) {
    const start = Math.max(0,idx-60), slice = macdHistArr.slice(start,idx+1).filter(v=>v!=null);
    if (slice.length>5) {
      const range = Math.max(...slice)-Math.min(...slice);
      if (range>0) { scores.push(Math.max(-1,Math.min(1,macdHist/(range/2)))); weights.push(1.0); }
    }
  }
  if (ma20!=null&&ma50!=null) { scores.push(ma20>ma50?1:-1); weights.push(0.7); }
  if (roc20!=null) { scores.push(Math.max(-1,Math.min(1,roc20/10))); weights.push(0.6); }
  if (stochK!=null&&stochD!=null) { scores.push(stochK>stochD?1:-1); weights.push(0.5); }
  if (!scores.length) return 0;
  const tw = weights.reduce((a,b)=>a+b,0);
  return scores.reduce((s,v,i)=>s+v*weights[i],0)/tw;
}

function scoreVolatility(vixClose, vixMA20, vixShortMA, vixLongMA) {
  const scores = [], weights = [];
  if (vixClose!=null&&vixMA20!=null&&vixMA20>0) {
    const dev = (vixClose-vixMA20)/vixMA20;
    scores.push(Math.max(-1,Math.min(1,dev*3))); weights.push(1.0);
  }
  if (vixShortMA!=null&&vixLongMA!=null&&vixLongMA>0) {
    const term = (vixShortMA-vixLongMA)/vixLongMA;
    scores.push(Math.max(-1,Math.min(1,term*5))); weights.push(0.6);
  }
  if (!scores.length) return 0;
  const tw = weights.reduce((a,b)=>a+b,0);
  return scores.reduce((s,v,i)=>s+v*weights[i],0)/tw;
}

function computeRegimeAdjustedScore(regime, mrScore, momScore, volScore, adxStrength) {
  switch(regime) {
    case "BULL_TREND": return mrScore*3.0 + momScore*1.5 + volScore*1.0 + adxStrength*1.5;
    case "BEAR_TREND": return mrScore*1.5 + momScore*2.5 + volScore*1.0 - adxStrength*1.5;
    case "HIGH_VOL": return mrScore*3.5 + momScore*0.5 + volScore*2.0;
    case "CHOPPY": return (mrScore*1.0 + momScore*0.5 + volScore*0.5)*0.5;
    default: return mrScore + momScore + volScore;
  }
}

// --- Main Computation ---
async function computeSignals() {
  const [spxData, vixData] = await Promise.all([fetchYahooData("^GSPC","2y"), fetchYahooData("^VIX","2y")]);

  const vixMap = new Map();
  vixData.forEach(d => vixMap.set(d.date.toISOString().slice(0,10), d.close));

  const data = spxData.map(d => ({
    ...d, dateStr: d.date.toISOString().slice(0,10),
    vixClose: vixMap.get(d.date.toISOString().slice(0,10)) || null,
  }));
  for (let i=1;i<data.length;i++) if(data[i].vixClose==null) data[i].vixClose=data[i-1].vixClose;

  const closes=data.map(d=>d.close), highs=data.map(d=>d.high), lows=data.map(d=>d.low);
  const volumes=data.map(d=>d.volume), vixCloses=data.map(d=>d.vixClose);

  // Compute all indicators
  const rsi14=computeRSI(closes,14), rsi5=computeRSI(closes,5);
  const macd=computeMACD(closes);
  const ma20=computeSMA(closes,20), ma50=computeSMA(closes,50), ma200=computeSMA(closes,200), ma10=computeSMA(closes,10);
  const bb=computeBollinger(closes);
  const willR=computeWilliamsR(highs,lows,closes);
  const stoch=computeStochastic(highs,lows,closes);
  const adxData=computeADX(highs,lows,closes);
  const cci=computeCCI(highs,lows,closes);
  const mfi=computeMFI(highs,lows,closes,volumes);
  const atr=computeATR(highs,lows,closes);
  const vixMA20=computeSMA(vixCloses,20), vixMA5=computeSMA(vixCloses,5), vixMA20Long=computeSMA(vixCloses,20);

  // VIX 80th percentile (trailing 252 days)
  const vixPctile80 = new Array(data.length).fill(null);
  for (let i=251;i<data.length;i++) {
    const slice = vixCloses.slice(i-251,i+1).filter(v=>v!=null).sort((a,b)=>a-b);
    if (slice.length>10) vixPctile80[i] = slice[Math.floor(slice.length*0.8)];
  }

  const i = data.length-1, iPrev = data.length-2;

  // Current regime
  const regime = classifyRegime(ma50[i], ma200[i], adxData.adx[i], adxData.plusDI[i], adxData.minusDI[i], vixCloses[i], vixMA20[i], vixPctile80[i]);
  const prevRegime = classifyRegime(ma50[iPrev], ma200[iPrev], adxData.adx[iPrev], adxData.plusDI[iPrev], adxData.minusDI[iPrev], vixCloses[iPrev], vixMA20[iPrev], vixPctile80[iPrev]);

  // Sub-scores
  const mrScore = scoreMeanReversion(rsi5[i], rsi14[i], willR[i], stoch.k[i], mfi[i], bb.pctB[i], cci[i]);
  const momScore = scoreMomentum(macd.histogram[i], macd.histogram, i, ma20[i], ma50[i], i>=20?(closes[i]/closes[i-20]-1)*100:null, stoch.k[i], stoch.d[i]);
  const volScore = scoreVolatility(vixCloses[i], vixMA20[i], vixMA5[i], vixMA20Long[i]);
  const adxStrength = adxData.adx[i]!=null ? Math.max(0,Math.min(1,(adxData.adx[i]-15)/35)) : 0.5;

  const composite = Math.round(computeRegimeAdjustedScore(regime, mrScore, momScore, volScore, adxStrength)*100)/100;

  // Previous day
  const prevMR = scoreMeanReversion(rsi5[iPrev], rsi14[iPrev], willR[iPrev], stoch.k[iPrev], mfi[iPrev], bb.pctB[iPrev], cci[iPrev]);
  const prevMom = scoreMomentum(macd.histogram[iPrev], macd.histogram, iPrev, ma20[iPrev], ma50[iPrev], iPrev>=20?(closes[iPrev]/closes[iPrev-20]-1)*100:null, stoch.k[iPrev], stoch.d[iPrev]);
  const prevVol = scoreVolatility(vixCloses[iPrev], vixMA20[iPrev], vixMA5[iPrev], vixMA20Long[iPrev]);
  const prevAdx = adxData.adx[iPrev]!=null ? Math.max(0,Math.min(1,(adxData.adx[iPrev]-15)/35)) : 0.5;
  const prevComposite = Math.round(computeRegimeAdjustedScore(prevRegime, prevMR, prevMom, prevVol, prevAdx)*100)/100;

  // Historical context
  const HOLD_PERIODS = [5,10,20];
  const maxHold = 20;
  const allScores = [];
  for (let j=200; j<data.length-maxHold; j++) {
    const r = classifyRegime(ma50[j],ma200[j],adxData.adx[j],adxData.plusDI[j],adxData.minusDI[j],vixCloses[j],vixMA20[j],vixPctile80[j]);
    const mr = scoreMeanReversion(rsi5[j],rsi14[j],willR[j],stoch.k[j],mfi[j],bb.pctB[j],cci[j]);
    const mo = scoreMomentum(macd.histogram[j],macd.histogram,j,ma20[j],ma50[j],j>=20?(closes[j]/closes[j-20]-1)*100:null,stoch.k[j],stoch.d[j]);
    const vo = scoreVolatility(vixCloses[j],vixMA20[j],vixMA5[j],vixMA20Long[j]);
    const ax = adxData.adx[j]!=null?Math.max(0,Math.min(1,(adxData.adx[j]-15)/35)):0.5;
    const sc = computeRegimeAdjustedScore(r,mr,mo,vo,ax);
    const fwd = {};
    for (const h of HOLD_PERIODS) if(j+h<closes.length) fwd[h]=(closes[j+h]/closes[j]-1)*100;
    allScores.push({score:sc,fwdReturns:fwd});
  }

  const tolerance = 0.75;
  const similar = allScores.filter(s=>Math.abs(s.score-composite)<=tolerance);
  const contexts = {};
  for (const h of HOLD_PERIODS) {
    const vs = similar.filter(s=>s.fwdReturns[h]!=null);
    if (vs.length>=10) {
      const rets = vs.map(s=>s.fwdReturns[h]).sort((a,b)=>a-b);
      contexts[h] = {
        n:vs.length, winRate:(rets.filter(r=>r>0).length/rets.length*100).toFixed(1),
        avgReturn:(rets.reduce((a,r)=>a+r,0)/rets.length).toFixed(3),
        medianReturn:rets[Math.floor(rets.length/2)].toFixed(3),
        worst:Math.min(...rets).toFixed(2), best:Math.max(...rets).toFixed(2),
      };
    }
  }

  // Chart data (90 days)
  const chartStart = Math.max(0,data.length-90), chartData = [];
  for (let j=chartStart;j<data.length;j++) {
    chartData.push({
      date:data[j].dateStr, open:data[j].open, high:data[j].high, low:data[j].low, close:data[j].close,
      ma20:ma20[j], ma50:ma50[j], ma200:ma200[j], bbUpper:bb.upper[j], bbLower:bb.lower[j],
      rsi14:rsi14[j], macdHist:macd.histogram[j], macdLine:macd.line[j], macdSignal:macd.signal[j],
    });
  }

  return {
    date: data[i].dateStr, price: closes[i],
    dailyChange: (closes[i]-closes[iPrev])/closes[iPrev]*100,
    vix: vixCloses[i], atrPct: atr[i]?(atr[i]/closes[i]*100):null,
    composite, prevComposite, regime, prevRegime,
    subScores: { mr: mrScore, mom: momScore, vol: volScore, adxStrength },
    signals: { RSI_5:rsi5[i], RSI_14:rsi14[i], WillR:willR[i], Stoch_K:stoch.k[i], MFI:mfi[i], BB_pctB:bb.pctB[i], CCI:cci[i], MACD_Hist:macd.histogram[i], ADX:adxData.adx[i], ROC_20:i>=20?(closes[i]/closes[i-20]-1)*100:null },
    mas: { MA_10:ma10[i], MA_20:ma20[i], MA_50:ma50[i], MA_200:ma200[i] },
    context: contexts, holdPeriods: HOLD_PERIODS, chartData,
  };
}

// --- Rendering ---
function scoreToLabel(score) {
  if (score>=4) return "STRONG LONG SIGNAL";
  if (score>=2.5) return "LONG SIGNAL";
  if (score>=1.5) return "LEAN BULLISH";
  if (score>=-1.5) return "NEUTRAL";
  if (score>=-2.5) return "LEAN BEARISH";
  if (score>=-4) return "SHORT SIGNAL";
  return "STRONG SHORT SIGNAL";
}

function scoreToColor(score) {
  if (score>=2.5) return "var(--green)";
  if (score>=1.5) return "#66bb6a";
  if (score>=-1.5) return "var(--text-dim)";
  if (score>=-2.5) return "#ef5350";
  return "var(--red)";
}

function regimeToEmoji(regime) {
  return {BULL_TREND:"🟢",BEAR_TREND:"🔴",HIGH_VOL:"🟡",CHOPPY:"⚪"}[regime]||"⚪";
}

function regimeToLabel(regime) {
  return {BULL_TREND:"Bull Trend",BEAR_TREND:"Bear Trend",HIGH_VOL:"High Volatility",CHOPPY:"Choppy / No Trend"}[regime]||regime;
}

      ${sigBar("Williams %R",result.signals.WillR!=null?-(result.signals.WillR+50)/25:0,1)}
      ${sigBar("Stoch %K",result.signals.Stoch_K!=null?-(result.signals.Stoch_K-50)/25:0,1)}
      ${sigBar("MFI",result.signals.MFI!=null?-(result.signals.MFI-50)/25:0,1)}
      ${sigBar("Bollinger",result.signals.BB_pctB!=null?-(result.signals.BB_pctB-0.5)*2:0,1)}
      ${sigBar("CCI",result.signals.CCI!=null?-result.signals.CCI/150:0,1)}
      ${sigBar("RSI 14d",result.signals.RSI_14!=null?-(result.signals.RSI_14-50)/20:0,1)}
    </div>
    <div class="signal-group">
      <div class="signal-group-header"><div class="signal-group-icon">→</div><span class="signal-group-title">Momentum</span><span class="signal-group-verdict ${verdictClass(mom)}">${verdictLabel(mom)} (${mom>=0?'+':''}${mom.toFixed(2)})</span></div>
      ${sigBar("MACD",result.signals.MACD_Hist!=null?Math.max(-1,Math.min(1,result.signals.MACD_Hist)):0,1)}
      ${sigBar("20/50 MA",result.mas.MA_20&&result.mas.MA_50?(result.mas.MA_20>result.mas.MA_50?1:-1):0,1)}
      ${sigBar("ROC 20d",result.signals.ROC_20!=null?Math.max(-1,Math.min(1,result.signals.ROC_20/10)):0,1)}
    </div>
    <div class="signal-group">
      <div class="signal-group-header"><div class="signal-group-icon">◈</div><span class="signal-group-title">Volatility & Sentiment</span><span class="signal-group-verdict ${verdictClass(vol)}">${verdictLabel(vol)} (${vol>=0?'+':''}${vol.toFixed(2)})</span></div>
      ${sigBar("VIX vs MA",vol,1)}
    </div>`;

  // Regime badge
  const regimeBadge = `<div style="display:inline-flex;align-items:center;gap:8px;padding:6px 14px;border-radius:8px;background:var(--surface2);font-family:'JetBrains Mono',monospace;font-size:13px;margin-bottom:16px;">
    <span>${regimeToEmoji(result.regime)}</span><span style="color:var(--text)">${regimeToLabel(result.regime)}</span>
    <span style="color:var(--text-muted);font-size:11px;">ADX: ${result.signals.ADX?.toFixed(0)||'—'}</span></div>`;

  // Narrative
  function generateNarrative() {
    const parts = [];
    parts.push(`Market regime: <strong>${regimeToLabel(result.regime)}</strong>.`);
    if (mr>0.4) parts.push("Mean-reversion indicators show SPX is <strong>oversold</strong> — multiple indicators (RSI, Williams %R, Stochastic, MFI) are in buying territory.");
    else if (mr>0.15) parts.push("Short-term indicators are mildly oversold, suggesting a potential bounce.");
    else if (mr<-0.4) parts.push("SPX is <strong>overbought</strong> on short-term measures — RSI, Stochastic, and Williams %R are elevated.");
    else if (mr<-0.15) parts.push("Short-term momentum is slightly stretched to the upside.");
    else parts.push("Mean-reversion signals are neutral — price is mid-range.");

    if (result.regime==="BULL_TREND"&&mr>0.3) parts.push("This is the <strong>highest-probability setup</strong>: an oversold bounce in a confirmed uptrend. The regime amplifies the mean-reversion signal.");
    else if (result.regime==="BULL_TREND") parts.push("The uptrend provides a tailwind, but mean-reversion hasn't triggered a strong entry yet.");
    else if (result.regime==="HIGH_VOL"&&mr>0.3) parts.push("Elevated volatility with oversold readings — <strong>contrarian buying opportunity</strong>, but size down given the volatility.");
    else if (result.regime==="CHOPPY") parts.push("Choppy regime means <strong>all signals are dampened</strong>. Low-conviction environment — best to wait.");
    else if (result.regime==="BEAR_TREND") parts.push("Bear trend active. Longs are counter-trend and higher risk. Momentum is weighted more heavily than mean-reversion in this regime.");

    if (result.composite>=2.5) parts.push(`<strong>Bottom line: ACTIONABLE LONG.</strong> Score of ${result.composite.toFixed(1)} is above the 2.5 entry threshold (backtested at 73% win rate, avg 3-5 day hold).`);
    else if (result.composite>=1.5) parts.push(`<strong>Bottom line:</strong> Leaning bullish but below the 2.5 entry threshold. Watch for the score to climb — could become actionable soon.`);
    else if (result.composite<=-2.5) parts.push(`<strong>Bottom line:</strong> Bearish signals are strong, but historical short-side edge is weak. Consider hedging longs rather than going outright short.`);
    else parts.push(`<strong>Bottom line:</strong> No trade. Score of ${result.composite.toFixed(1)} is in the neutral zone. Wait for regime + mean-reversion alignment.`);
    return parts.join(" ");
  }

  // MA levels
  const maHTML = Object.entries(result.mas).map(([name,val])=>{
    if(val==null)return"";
    const dist=(result.price-val)/val*100, clr=dist>=0?"var(--green)":"var(--red)", arr=dist>=0?"▲":"▼";
    return `<div class="ma-row"><span class="ma-name">${name}</span><span class="ma-price">${val.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}</span><span class="ma-dist" style="color:${clr}">${dist>=0?'+':''}${dist.toFixed(1)}% ${arr}</span></div>`;
  }).join("");

  // Context tabs
  const holdTabsHTML = result.holdPeriods.map((h,idx)=>`<button class="hold-tab ${idx===0?'active':''}" data-hold="${h}">${h}-Day</button>`).join("");
  const holdPanelsHTML = result.holdPeriods.map((h,idx)=>{
    const ctx=result.context[h];
    if(!ctx) return `<div class="context-panel ${idx===0?'active':''}" data-panel="${h}"><p style="color:var(--text-muted);font-size:13px;">Not enough data.</p></div>`;
    return `<div class="context-panel ${idx===0?'active':''}" data-panel="${h}"><div class="context-grid">
      <div class="context-stat"><div class="stat-value" style="color:${parseFloat(ctx.winRate)>55?'var(--green)':parseFloat(ctx.winRate)<45?'var(--red)':'var(--text)'}">${ctx.winRate}%</div><div class="stat-label">Win Rate</div></div>
      <div class="context-stat"><div class="stat-value" style="color:${parseFloat(ctx.avgReturn)>=0?'var(--green)':'var(--red)'">${parseFloat(ctx.avgReturn)>=0?'+':''}${ctx.avgReturn}%</div><div class="stat-label">Avg Return</div></div>
      <div class="context-stat"><div class="stat-value">${ctx.n}</div><div class="stat-label">Occurrences</div></div>
      <div class="context-stat"><div class="stat-value" style="color:var(--green)">${ctx.best}%</div><div class="stat-label">Best</div></div>
      <div class="context-stat"><div class="stat-value" style="color:var(--red)">${ctx.worst}%</div><div class="stat-label">Worst</div></div>
      <div class="context-stat"><div class="stat-value">${ctx.medianReturn}%</div><div class="stat-label">Median</div></div>
    </div></div>`;
  }).join("");

  // Render
  document.getElementById("dashboard").innerHTML = `
    <div class="score-hero fade-in" style="--score-color:${color}">
      <div class="score-top">
        <div class="price-block"><div class="price">${result.price.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}</div><div class="change" style="color:${changeColor}">${result.dailyChange>=0?'+':''}${result.dailyChange.toFixed(2)}%</div></div>
        <div class="vix-block"><div class="label">VIX</div><div class="value">${result.vix?result.vix.toFixed(2):'—'}</div></div>
      </div>
      ${regimeBadge}
      <div class="score-main">
        <div class="score-number" style="color:${color}">${result.composite>=0?'+':''}${result.composite.toFixed(2)}</div>
        <div class="score-meta"><div class="score-label" style="color:${color}">${label}</div>
          <div class="score-prev">prev ${result.prevComposite>=0?'+':''}${result.prevComposite.toFixed(2)} · chg ${scoreChange>=0?'+':''}${scoreChange.toFixed(2)}</div></div>
      </div>
      <div class="score-bar-container">
        <div class="score-bar-labels"><span>-7 Bearish</span><span>Neutral</span><span>Bullish +7</span></div>
        <div class="score-bar-zones">
          <div class="zone zone-short">Short</div><div class="zone zone-caution-bear">Lean ↓</div>
          <div class="zone zone-neutral">No Trade</div><div class="zone zone-caution-bull">Lean ↑</div><div class="zone zone-long">Long</div>
        </div>
        <div class="score-bar"><div class="marker" style="left:${barPosition}%"></div></div>
      </div>
    </div>

    ${generateTradeSetup()}

    <div class="card full fade-in" style="margin-bottom:16px"><h2>Price Chart — 90 Days</h2>
      <canvas id="priceChart" style="width:100%;height:320px"></canvas>
      <div style="display:flex;gap:16px;margin-top:8px;flex-wrap:wrap">
        <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--blue)">— MA 20</span>
        <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--amber)">— MA 50</span>
        <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#ab47bc">— MA 200</span>
        <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-muted)">░ Bollinger</span>
      </div></div>

    <div class="grid" style="margin-bottom:16px">
      <div class="card fade-in"><h2>RSI (14)</h2><canvas id="rsiChart" style="width:100%;height:120px"></canvas></div>
      <div class="card fade-in"><h2>MACD</h2><canvas id="macdChart" style="width:100%;height:120px"></canvas></div>
    </div>

    <div class="grid">
      <div class="card full fade-in">
        <div class="narrative" style="border-color:${color}"><div class="narrative-label">What the signals are saying</div><p>${generateNarrative()}</p></div>
        <h2>Signal Breakdown</h2>
        ${signalGroupsHTML}
      </div>
      <div class="card fade-in"><h2>Key Levels</h2>${maHTML}</div>
      <div class="card fade-in"><h2>ATR (14d)</h2><div class="context-stat"><div class="stat-value">${result.atrPct?result.atrPct.toFixed(2)+'%':'—'}</div><div class="stat-label">Daily Range</div></div></div>
      <div class="card full fade-in"><h2>Historical Context</h2>
        <div class="hold-tabs" id="holdTabs">${holdTabsHTML}</div><div id="holdPanels">${holdPanelsHTML}</div></div>
    </div>

    <div class="footer fade-in">Research tool only — not financial advice. Always use proper risk management.<br>
      V5 Regime-Aware Engine · Entry ≥ 2.5 · Exit < 1.5 · Backtested 73% win rate (2005-present, excl. black swans)</div>
  `;

  document.getElementById("dashboard").style.display = "block";

  // --- Charts (same as before) ---
  function drawChart(id, drawFn) {
    const canvas = document.getElementById(id);
    if(!canvas) return;
    const dpr=window.devicePixelRatio||1, rect=canvas.getBoundingClientRect();
    canvas.width=rect.width*dpr; canvas.height=rect.height*dpr;
    const ctx=canvas.getContext("2d"); ctx.scale(dpr,dpr);
    drawFn(ctx, rect.width, rect.height, result.chartData);
  }

  drawChart("priceChart", (ctx,W,H,cd) => {
    const pad={top:10,right:60,bottom:24,left:10}, cW=W-pad.left-pad.right, cH=H-pad.top-pad.bottom;
    let minP=Infinity,maxP=-Infinity;
    for(const d of cd){const lo=Math.min(d.low,d.bbLower||Infinity),hi=Math.max(d.high,d.bbUpper||-Infinity);if(lo<minP)minP=lo;if(hi>maxP)maxP=hi;}
    const pR=maxP-minP;minP-=pR*0.03;maxP+=pR*0.03;
    const n=cd.length,gap=cW/n,candleW=Math.max(1,gap*0.6);
    const x=i=>pad.left+i*gap+gap/2, y=p=>pad.top+(1-(p-minP)/(maxP-minP))*cH;

    ctx.strokeStyle="#1a1a26";ctx.lineWidth=1;
    for(let g=0;g<=5;g++){const py=pad.top+(cH/5)*g;ctx.beginPath();ctx.moveTo(pad.left,py);ctx.lineTo(W-pad.right,py);ctx.stroke();
      ctx.fillStyle="#4a4a5e";ctx.font="11px 'JetBrains Mono',monospace";ctx.textAlign="left";ctx.fillText((maxP-((maxP-minP)/5)*g).toFixed(0),W-pad.right+6,py+4);}

    // Bollinger fill
    ctx.beginPath();let bs=false;
    for(let i=0;i<n;i++)if(cd[i].bbUpper!=null){if(!bs){ctx.moveTo(x(i),y(cd[i].bbUpper));bs=true;}else ctx.lineTo(x(i),y(cd[i].bbUpper));}
    for(let i=n-1;i>=0;i--)if(cd[i].bbLower!=null)ctx.lineTo(x(i),y(cd[i].bbLower));
    ctx.closePath();ctx.fillStyle="rgba(68,138,255,0.06)";ctx.fill();

    ctx.strokeStyle="rgba(68,138,255,0.2)";ctx.lineWidth=1;ctx.setLineDash([3,3]);
    for(const k of["bbUpper","bbLower"]){ctx.beginPath();let s=false;for(let i=0;i<n;i++)if(cd[i][k]!=null){if(!s){ctx.moveTo(x(i),y(cd[i][k]));s=true;}else ctx.lineTo(x(i),y(cd[i][k]));}ctx.stroke();}
    ctx.setLineDash([]);

    for(let i=0;i<n;i++){const d=cd[i],bull=d.close>=d.open,clr=bull?"#00e676":"#ff5252";
      ctx.strokeStyle=clr;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x(i),y(d.high));ctx.lineTo(x(i),y(d.low));ctx.stroke();
      ctx.fillStyle=bull?"rgba(0,230,118,0.8)":"rgba(255,82,82,0.8)";
      const bT=y(Math.max(d.open,d.close)),bB=y(Math.min(d.open,d.close));ctx.fillRect(x(i)-candleW/2,bT,candleW,Math.max(1,bB-bT));}

    for(const[key,clr,w]of[["ma20","#448aff",1.5],["ma50","#ffd740",1.5],["ma200","#ab47bc",1.5]]){
      ctx.strokeStyle=clr;ctx.lineWidth=w;ctx.beginPath();let s=false;
      for(let i=0;i<n;i++){const v=cd[i][key];if(v!=null){if(!s){ctx.moveTo(x(i),y(v));s=true;}else ctx.lineTo(x(i),y(v));}}ctx.stroke();}

    ctx.fillStyle="#4a4a5e";ctx.font="10px 'JetBrains Mono',monospace";ctx.textAlign="center";
    const le=Math.ceil(n/6);for(let i=0;i<n;i+=le){const d=new Date(cd[i].date);ctx.fillText(d.toLocaleDateString("en-US",{month:"short",day:"numeric"}),x(i),H-4);}
  });

  drawChart("rsiChart", (ctx,W,H,cd) => {
    const pad={top:8,right:40,bottom:4,left:10},cW=W-pad.left-pad.right,cH=H-pad.top-pad.bottom,n=cd.length,gap=cW/n;
    const x=i=>pad.left+i*gap+gap/2, y=v=>pad.top+(1-v/100)*cH;
    ctx.fillStyle="rgba(255,82,82,0.05)";ctx.fillRect(pad.left,y(100),cW,y(70)-y(100));
    ctx.fillStyle="rgba(0,230,118,0.05)";ctx.fillRect(pad.left,y(30),cW,y(0)-y(30));
    ctx.strokeStyle="#2a2a3a";ctx.lineWidth=1;
    for(const l of[30,50,70]){ctx.beginPath();ctx.moveTo(pad.left,y(l));ctx.lineTo(W-pad.right,y(l));ctx.stroke();ctx.fillStyle="#4a4a5e";ctx.font="10px 'JetBrains Mono',monospace";ctx.textAlign="left";ctx.fillText(l,W-pad.right+4,y(l)+4);}
    ctx.strokeStyle="#448aff";ctx.lineWidth=1.5;ctx.beginPath();let s=false;
    for(let i=0;i<n;i++){const v=cd[i].rsi14;if(v!=null){if(!s){ctx.moveTo(x(i),y(v));s=true;}else ctx.lineTo(x(i),y(v));}}ctx.stroke();
    const last=cd[n-1].rsi14;if(last!=null){ctx.fillStyle=last<30?"#00e676":last>70?"#ff5252":"#448aff";ctx.beginPath();ctx.arc(x(n-1),y(last),3,0,Math.PI*2);ctx.fill();}
  });

  drawChart("macdChart", (ctx,W,H,cd) => {
    const pad={top:8,right:40,bottom:4,left:10},cW=W-pad.left-pad.right,cH=H-pad.top-pad.bottom,n=cd.length,gap=cW/n,barW=Math.max(1,gap*0.6);
    let mx=0;for(const d of cd){const v=Math.max(Math.abs(d.macdHist||0),Math.abs(d.macdLine||0));if(v>mx)mx=v;}mx*=1.1;
    const x=i=>pad.left+i*gap+gap/2, y=v=>pad.top+(1-(v+mx)/(2*mx))*cH;
    ctx.strokeStyle="#2a2a3a";ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pad.left,y(0));ctx.lineTo(W-pad.right,y(0));ctx.stroke();
    for(let i=0;i<n;i++){const h=cd[i].macdHist;if(h==null)continue;ctx.fillStyle=h>=0?"rgba(0,230,118,0.6)":"rgba(255,82,82,0.6)";
      const bT=h>=0?y(h):y(0);ctx.fillRect(x(i)-barW/2,bT,barW,Math.abs(y(h)-y(0)));}
    for(const[k,c]of[["macdLine","#448aff"],["macdSignal","#ff9800"]]){ctx.strokeStyle=c;ctx.lineWidth=1;ctx.beginPath();let s=false;
      for(let i=0;i<n;i++){const v=cd[i][k];if(v!=null){if(!s){ctx.moveTo(x(i),y(v));s=true;}else ctx.lineTo(x(i),y(v));}}ctx.stroke();}
  });

  // Tab switching
  document.getElementById("holdTabs")?.addEventListener("click",e=>{
    const tab=e.target.closest(".hold-tab");if(!tab||!tab.dataset.hold)return;
    document.querySelectorAll("#holdTabs .hold-tab").forEach(t=>t.classList.remove("active"));
    document.querySelectorAll("#holdPanels .context-panel").forEach(p=>p.classList.remove("active"));
    tab.classList.add("active");
    document.querySelector(`.context-panel[data-panel="${tab.dataset.hold}"]`)?.classList.add("active");
  });
}

// --- Init ---
async function init() {
  document.getElementById("dateDisplay").textContent = new Date().toLocaleDateString("en-US",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
  try {
    const result = await computeSignals();
    document.getElementById("loadingState").style.display = "none";
    renderDashboard(result);
  } catch(err) {
    console.error("Live data failed, using Friday close fallback:", err);
    // Show fallback with Friday March 13, 2026 data
    document.getElementById("loadingState").style.display = "none";
    const fallback = {
      date: "2026-03-13", price: 6632.19, dailyChange: -0.61, vix: 27.19, atrPct: 1.53,
      composite: 1.44, prevComposite: 1.50, regime: "CHOPPY", prevRegime: "CHOPPY",
      subScores: { mr: 0.52, mom: -0.31, vol: 0.38, adxStrength: 0.35 },
      signals: { RSI_5: 22, RSI_14: 35, WillR: -78, Stoch_K: 18, MFI: 32, BB_pctB: 0.08, CCI: -120, MACD_Hist: -15, ADX: 27, ROC_20: -4.2 },
      mas: { MA_10: 6779.66, MA_20: 6829.52, MA_50: 6884.14, MA_200: 6604.06 },
      context: {
        5: { n: 180, winRate: "58.3", avgReturn: "0.312", medianReturn: "0.401", worst: "-8.21", best: "5.44" },
        10: { n: 175, winRate: "60.0", avgReturn: "0.521", medianReturn: "0.610", worst: "-10.33", best: "8.12" },
        20: { n: 168, winRate: "62.5", avgReturn: "0.890", medianReturn: "1.020", worst: "-12.50", best: "11.30" },
      },
      holdPeriods: [5, 10, 20],
      chartData: [], // No chart data in fallback
      _isFallback: true,
    };
    renderDashboard(fallback);
    // Show a subtle notice
    const notice = document.createElement("div");
    notice.style.cssText = "text-align:center;padding:12px;margin-bottom:16px;background:var(--amber-dim);border:1px solid rgba(255,215,64,0.2);border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--amber);";
    notice.textContent = "⚠ Using Friday March 13 close data — live data unavailable. Try refreshing on a weekday.";
    document.getElementById("dashboard").prepend(notice);
  }
}

init();
</script>
</body>
</html>
